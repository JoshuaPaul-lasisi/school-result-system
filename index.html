<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debbyfield Schools — Academic Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --burg:#8B1A2F; --gold:#C9A84C; --r:6px;
      --font-sans:'Inter',system-ui,-apple-system,sans-serif;
      --bg:#ffffff; --bg2:#f6f6f7;
      --bg-ok:#e8f5e9; --bg-info:#e3f2fd; --bg-warn:#fff8e1; --bg-err:#ffebee;
      --tx:#111827; --tx2:#6b7280; --tx3:#9ca3af;
      --tx-ok:#16a34a; --tx-info:#1d4ed8; --tx-warn:#d97706; --tx-err:#dc2626;
      --bd:#9ca3af; --bd2:#d1d5db; --bd3:#e5e7eb;
      --rmd:6px; --rlg:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font-sans);font-size:14px;background:#eef0f2;display:flex;align-items:center;justify-content:center;min-height:100vh}

    /* ── app shell ── */
    .app{display:grid;grid-template-columns:214px 1fr;width:100%;max-width:1120px;height:96vh;border:.5px solid var(--bd3);border-radius:var(--rlg);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.09)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

    /* ── sidebar ── */
    .sidebar{background:var(--bg2);border-right:.5px solid var(--bd3);display:flex;flex-direction:column;overflow-y:auto}
    .logo{padding:14px 16px 12px;border-bottom:.5px solid var(--bd3)}
    .logo-name{font-size:13px;font-weight:600;color:var(--tx)}
    .logo-term{font-size:11px;color:var(--tx2);margin-top:2px}
    .db-row{display:flex;align-items:center;gap:5px;margin-top:6px}
    .db-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .dot-off{background:var(--tx3)} .dot-ok{background:var(--tx-ok)} .dot-err{background:var(--tx-err)} .dot-spin{background:var(--tx-warn)}
    .db-lbl{font-size:10px;color:var(--tx3)}
    .nav-section{padding:8px 8px 0}
    .nav-label{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;padding:6px 8px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--tx2);transition:background .15s;user-select:none}
    .nav-item:hover{background:var(--bg)}
    .nav-item.active{background:var(--bg);color:var(--tx);font-weight:500}
    .nav-item i{font-size:15px;opacity:.7}

    /* ── main ── */
    .main{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--bd3);flex-shrink:0;gap:8px}
    .topbar-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .topbar-text{min-width:0}
    .topbar-title{font-size:15px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-meta{font-size:12px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .save-indicator{font-size:11px;color:var(--tx2);white-space:nowrap;flex-shrink:0}
    .content{flex:1;overflow-y:auto;padding:16px}

    /* hamburger — hidden on desktop */
    .hamburger{display:none;align-items:center;justify-content:center;width:34px;height:34px;border:none;background:none;cursor:pointer;color:var(--tx);border-radius:var(--r);flex-shrink:0}
    .hamburger:hover{background:var(--bg2)}
    .hamburger i{font-size:20px}

    /* ── buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-family:var(--font-sans);cursor:pointer;transition:background .15s}
    .btn:hover{background:var(--bg2)}
    .btn-primary{background:var(--burg);border-color:var(--burg);color:#fff}
    .btn-primary:hover{background:#6d1424}
    .btn-sm{padding:5px 10px;font-size:12px}

    /* ── badges ── */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
    .badge-a{background:var(--bg-ok);color:var(--tx-ok)} .badge-b{background:var(--bg-info);color:var(--tx-info)}
    .badge-c{background:var(--bg-warn);color:var(--tx-warn)} .badge-d{background:var(--bg-warn);color:var(--tx-warn)}
    .badge-f{background:var(--bg-err);color:var(--tx-err)} .badge-ok{background:var(--bg-ok);color:var(--tx-ok)}
    .badge-err{background:var(--bg-err);color:var(--tx-err)} .badge-neutral{background:var(--bg2);color:var(--tx2)}

    /* ── cards ── */
    .card{background:var(--bg);border:.5px solid var(--bd3);border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
    .card-title{font-size:13px;font-weight:600;color:var(--tx)}

    /* ── stats ── */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .stat{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
    .stat-val{font-size:22px;font-weight:600;color:var(--tx)}
    .stat-lbl{font-size:11px;color:var(--tx2);margin-top:2px}

    /* ── table ── */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx2);border-bottom:.5px solid var(--bd3);white-space:nowrap}
    td{padding:8px 10px;border-bottom:.5px solid var(--bd3);color:var(--tx)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg2)}
    .trow-click{cursor:pointer}

    /* ── forms ── */
    input,select,textarea{font-family:var(--font-sans);font-size:13px;color:var(--tx);background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--r);padding:7px 10px;width:100%}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--burg)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px}

    /* ── score rows (student detail) ── */
    .srow-hdr{display:flex;align-items:center;padding:0 0 8px;border-bottom:.5px solid var(--bd3);margin-bottom:4px;gap:8px}
    .srow-hdr-name{flex:1;font-size:11px;font-weight:500;color:var(--tx2)}
    .srow-hdr-fields{display:grid;grid-template-columns:80px 80px 80px 70px;gap:8px}
    .srow-hdr-fields span{font-size:11px;font-weight:500;color:var(--tx2);text-align:center}
    .srow{display:flex;align-items:center;padding:7px 0;border-bottom:.5px solid var(--bd3);gap:8px}
    .srow:last-child{border-bottom:none}
    .srow-name{flex:1;font-size:13px;min-width:0}
    .srow-fields{display:grid;grid-template-columns:80px 80px 80px 70px;gap:8px;align-items:center;flex-shrink:0}
    .srow-fields span{text-align:center}
    .score-input{padding:5px 8px;text-align:center;width:100%}
    .mobile-field-labels{display:none;grid-template-columns:1fr 1fr 56px 48px;gap:6px;margin-bottom:2px}
    .mobile-field-labels span{font-size:10px;color:var(--tx2);text-align:center}

    /* ── search ── */
    .search-bar{display:flex;gap:8px;margin-bottom:14px}
    .search-bar input{flex:1}

    /* ── empty ── */
    .empty{text-align:center;padding:40px;color:var(--tx2)}
    .empty i{font-size:32px;margin-bottom:8px;display:block;opacity:.4}

    /* ── report card ── */
    .rc{background:var(--bg);max-width:640px;margin:0 auto}
    .rc-header{border-bottom:2px solid var(--burg);padding-bottom:12px;margin-bottom:14px}
    .rc-school{font-size:17px;font-weight:700;color:var(--burg);text-align:center}
    .rc-addr{font-size:11px;color:var(--tx2);text-align:center;margin-top:2px}
    .rc-title{font-size:18px;font-weight:600;text-align:center;margin:8px 0 4px;color:var(--tx)}
    .rc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:12px;margin-bottom:14px}
    .rc-info-row{display:flex;gap:6px}
    .rc-info-label{color:var(--tx2);min-width:80px}
    .rc-info-val{color:var(--tx);font-weight:600}
    .rc-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
    .rc-table th{background:var(--bg2);padding:7px 10px;text-align:left;border:.5px solid var(--bd3);font-size:11px;font-weight:500;color:var(--tx2)}
    .rc-table td{padding:6px 10px;border:.5px solid var(--bd3);color:var(--tx)}
    .att-row{display:flex;gap:20px;font-size:12px;margin-bottom:14px;flex-wrap:wrap}
    .att-item{display:flex;flex-direction:column;gap:2px}
    .att-item span:first-child{color:var(--tx2);font-size:11px}
    .att-item span:last-child{font-weight:600}
    .char-box{background:var(--bg2);border-left:3px solid var(--gold);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:14px;font-size:12px}
    .char-label{font-size:10px;font-weight:600;color:#8A6F30;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    .comment-row{margin-bottom:10px;font-size:12px}
    .comment-label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
    .sig-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:.5px solid var(--bd3);font-size:11px;color:var(--tx2)}

    /* ── settings ── */
    .setup-step{display:flex;gap:10px;margin-bottom:10px;font-size:12px}
    .setup-num{width:20px;height:20px;border-radius:50%;background:var(--burg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}

    /* ── print ── */
    @media print{
      html,body{background:#fff;display:block}
      .app,.sidebar,.topbar,.overlay{display:none!important}
      .content{padding:0;overflow:visible}
      .rc{max-width:none;display:block!important}
      .card{border:none;padding:0}
    }

    /* ════════════════════════════════════════
       RESPONSIVE — tablet & mobile
    ════════════════════════════════════════ */
    @media (max-width:800px){
      .stats-row{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width:700px){
      /* full screen on mobile */
      body{align-items:stretch;background:var(--bg);padding:0}
      .app{grid-template-columns:1fr;height:100dvh;max-width:none;border-radius:0;border:none;box-shadow:none}

      /* sidebar becomes a fixed drawer */
      .sidebar{
        position:fixed;top:0;left:0;bottom:0;
        width:230px;z-index:100;
        transform:translateX(-100%);
        transition:transform .25s ease;
        box-shadow:4px 0 20px rgba(0,0,0,.15);
        border-right:.5px solid var(--bd3);
      }
      .sidebar.open{transform:translateX(0)}

      /* show hamburger */
      .hamburger{display:flex}

      /* topbar tweaks */
      .topbar{padding:10px 12px}
      .content{padding:12px}

      /* stats 2-col */
      .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
      .stat-val{font-size:18px}

      /* score rows: stack on mobile */
      .srow-hdr{display:none}
      .srow{flex-direction:column;align-items:stretch;padding:10px 0;gap:4px}
      .srow-name{font-size:13px;font-weight:500}
      .srow-fields{grid-template-columns:1fr 1fr 56px 48px;gap:6px}
      .mobile-field-labels{display:grid}

      /* attendance grid */
      .att-grid{grid-template-columns:1fr 1fr!important}

      /* section table: hide ID column */
      .col-id{display:none}

      /* rc info grid: single column */
      .rc-info-grid{grid-template-columns:1fr}

      /* sig row: stack */
      .sig-row{flex-direction:column;gap:16px}
      .sig-row > div > div{width:100%!important}

      /* search bar */
      .search-bar{flex-direction:column}

      /* settings grid */
      .settings-grid{grid-template-columns:1fr!important}

      /* bulk entry table: scroll */
      .entry-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
      #entry-tbl{min-width:420px}
    }

    /* ── modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:var(--bg);border-radius:var(--rlg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal-head{padding:14px 16px;border-bottom:.5px solid var(--bd3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-body{padding:16px}
    .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--tx2);line-height:1;padding:0;display:flex;align-items:center}

    /* ── admin tabs ── */
    .atabs{display:flex;gap:2px;border-bottom:.5px solid var(--bd3);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .atab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;user-select:none}
    .atab.active{color:var(--burg);border-bottom-color:var(--burg);font-weight:500}
    .atab:hover:not(.active){color:var(--tx)}

    /* ── filter bar ── */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .filter-bar select,.filter-bar input{width:auto;flex:1;min-width:120px}

    /* ── staff / status badges ── */
    .badge-teach{background:#e8f4ff;color:#1565C0}
    .badge-nonteach{background:#f3e8ff;color:#6a1b9a}
    .badge-left{background:var(--bg2);color:var(--tx3)}
    .badge-grad{background:#e8f5e9;color:#2e7d32}

    /* ── pill row (annex pills) ── */
    .annex-pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--tx2)}

    @media (max-width:700px){
      .modal-overlay{padding:8px;align-items:flex-end}
      .modal-box{max-height:85vh;border-radius:var(--rlg) var(--rlg) 0 0}
    }
  </style>
</head>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">

      <span style="font-weight:600;font-size:14px" id="modal-title"></span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="app">

      <div class="nav-item" onclick="nav('class','Senior Secondary',this)"><i class="ti ti-certificate"></i>SS</div>

    <div class="nav-section">

      <div class="nav-item" onclick="nav('entry',null,this)"><i class="ti ti-table-plus"></i>Score Entry</div>
      <div class="nav-item" onclick="nav('search',null,this)"><i class="ti ti-search"></i>Find Student</div>
      <div class="nav-item" onclick="nav('staff',null,this)"><i class="ti ti-users"></i>Staff Directory</div>
      <div class="nav-item" onclick="nav('settings',null,this)"><i class="ti ti-settings"></i>Settings</div>
      <div class="nav-item" onclick="nav('admin',null,this)"><i class="ti ti-shield-lock"></i>Admin</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
          <i class="ti ti-menu-2"></i>
        </button>
        <div class="topbar-text">
          <div class="topbar-title" id="page-title">Dashboard</div>
          <div class="topbar-meta" id="page-meta"></div>
        </div>
      </div>
      <span class="save-indicator" id="save-indicator"></span>
      <div id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

/* ── sha256 ── */
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ── supabase ── */
function initSupabase(url, key) {
  try { if (window.supabase && url && key) dbClient = window.supabase.createClient(url, key); }
  catch(e) { dbClient = null; }
}

async function loadAnnexes() {
  if (!dbClient) return;
  const {data} = await dbClient.from("annexes").select("id,name,address").order("id");
  if (data && data.length) annexList = data;
}

async function loadRoster() {
  if (!dbClient) return;
  const {data, error} = await dbClient
    .from("enrollments")
    .select("cls,sec,annex_id,status,students(id,name,gender)")
    .eq("term",currentTerm).eq("session",currentSession).eq("status","active");
  if (!error && data) {
    roster = data.map(r=>({
      id:r.students.id, name:r.students.name, gender:r.students.gender,
      cls:r.cls, sec:r.sec, annex_id:r.annex_id, status:r.status
    }));
  }
}

async function loadAllStudentsDb() {
  if (!dbClient) return;
  const {data} = await dbClient.from("students").select("id,name,gender,annex_id").order("name");
  if (data) allStudentsDb = data;
}

async function loadStaff() {
  if (!dbClient) return;
  const {data, error} = await dbClient
    .from("staff_assignments")
    .select("id,annex_id,status,staff:staff_id(id,name,gender,staff_type,role,phone)")
    .eq("term",currentTerm).eq("session",currentSession).eq("status","active");
  if (!error && data) {
    staffList = data.map(r=>({
      assignment_id:r.id, staff_id:r.staff.id, name:r.staff.name,
      gender:r.staff.gender, staff_type:r.staff.staff_type,
      role:r.staff.role||"", phone:r.staff.phone||"", annex_id:r.annex_id
    }));
  }
}

async function loadAdminPin() {

  if (data) storedPinHash = data.pin_hash;
  else storedPinHash = null;
}

async function loadFromSupabase() {
  if (!dbClient) return false;
  try {
    await Promise.all([loadAnnexes(), loadRoster(), loadAllStudentsDb(), loadStaff(), loadAdminPin()]);
    const [sr, ar, or_] = await Promise.all([
      dbClient.from("scores").select("*").eq("term",currentTerm).eq("session",currentSession),
      dbClient.from("attendance").select("*").eq("term",currentTerm).eq("session",currentSession),
      dbClient.from("observations").select("*").eq("term",currentTerm).eq("session",currentSession),
    ]);
    if (sr.error||ar.error||or_.error) throw new Error("query failed");
    store = {scores:{},attendance:{},character:{},teacherComments:{},principalComments:{}};
    for (const r of sr.data) {
      if (!store.scores[r.student_id]) store.scores[r.student_id]={};
      store.scores[r.student_id][r.subject]={ca:r.ca??'',exam:r.exam??''};
    }
    for (const r of ar.data) store.attendance[r.student_id]={total:r.total_days,present:r.days_present??''};
    for (const r of or_.data) {
      store.character[r.student_id]        = r.character_note    ||'';
      store.teacherComments[r.student_id]  = r.teacher_comment   ||'';
      store.principalComments[r.student_id]= r.principal_comment ||'';
    }
    saveLocalStore(); return true;
  } catch(e) { console.error("Supabase load:",e); return false; }
}
async function upsertScore(sid, sub) {
  if (!dbClient) return;
  const key=`${sid}|${sub}`; clearTimeout(scoreTimers[key]); markSaving();
  scoreTimers[key]=setTimeout(async()=>{
    const sc=getScore(sid,sub);
    const {error}=await dbClient.from("scores").upsert({student_id:sid,subject:sub,ca:sc.ca===''?null:parseFloat(sc.ca),exam:sc.exam===''?null:parseFloat(sc.exam),term:currentTerm,session:currentSession},{onConflict:"student_id,subject,term,session"});
    if(error)console.error("score upsert:",error); markSaved();
  },700);
}
async function upsertAttendance(sid) {
  if (!dbClient) return;
  clearTimeout(attTimers[sid]); markSaving();
  attTimers[sid]=setTimeout(async()=>{
    const a=getAtt(sid);
    const {error}=await dbClient.from("attendance").upsert({student_id:sid,total_days:parseInt(a.total)||57,days_present:a.present===''?null:parseInt(a.present),term:currentTerm,session:currentSession},{onConflict:"student_id,term,session"});
    if(error)console.error("att upsert:",error); markSaved();
  },700);
}
async function upsertObservation(sid) {
  if (!dbClient) return;
  clearTimeout(obsTimers[sid]); markSaving();
  obsTimers[sid]=setTimeout(async()=>{
    const {error}=await dbClient.from("observations").upsert({student_id:sid,character_note:getChar(sid),teacher_comment:getTComment(sid),principal_comment:getPComment(sid),term:currentTerm,session:currentSession},{onConflict:"student_id,term,session"});
    if(error)console.error("obs upsert:",error); markSaved();
  },700);
}

/* ── local store ── */
function storeKey(){return`dbs-v2-${currentTerm.replace(/\s/g,"-")}-${currentSession.replace(/\//g,"-")}`;}
function loadLocalStore(){try{const r=localStorage.getItem(storeKey())||localStorage.getItem("dbs-records-v1");if(r)store=JSON.parse(r);}catch(e){}}
function saveLocalStore(){try{localStorage.setItem(storeKey(),JSON.stringify(store));}catch(e){}}

/* ── save indicator ── */
function markSaving(){pendingSaves++;const el=document.getElementById("save-indicator");if(el)el.textContent="Saving…";}
function markSaved(){pendingSaves=Math.max(0,pendingSaves-1);if(pendingSaves===0){const el=document.getElementById("save-indicator");if(el){el.textContent="Saved ✓";setTimeout(()=>{if(el)el.textContent=""},2500);}}}

/* ── db indicator ── */
function updateDbIndicator(){
  const dot=document.getElementById("db-dot"),lbl=document.getElementById("db-lbl");
  if(!dot||!lbl)return;
  dot.className="db-dot "+({connected:"dot-ok",error:"dot-err",loading:"dot-spin",offline:"dot-off"}[dbStatus]||"dot-off");
  lbl.textContent={connected:"Supabase connected",error:"Connection error",loading:"Connecting…",offline:"Local only"}[dbStatus]||"Local only";
}
function updateTermDisplay(){const el=document.getElementById("term-display");if(el)el.textContent=`${currentTerm} · ${currentSession}`;}

/* ── getters / setters ── */
function getScore(sid,sub){return(store.scores[sid]||{})[sub]||{ca:'',exam:''};}
function setScore(sid,sub,field,val){if(!store.scores[sid])store.scores[sid]={};if(!store.scores[sid][sub])store.scores[sid][sub]={ca:'',exam:''};store.scores[sid][sub][field]=val;saveLocalStore();upsertScore(sid,sub);}
function getAtt(sid){return store.attendance[sid]||{total:57,present:''};}
function setAtt(sid,field,val){if(!store.attendance[sid])store.attendance[sid]={total:57,present:''};store.attendance[sid][field]=val;saveLocalStore();upsertAttendance(sid);}
function getChar(sid){return store.character[sid]||'';}
function setChar(sid,val){store.character[sid]=val;saveLocalStore();upsertObservation(sid);}
function getTComment(sid){return store.teacherComments[sid]||'';}
function setTComment(sid,val){store.teacherComments[sid]=val;saveLocalStore();upsertObservation(sid);}
function getPComment(sid){return store.principalComments[sid]||'';}
function setPComment(sid,val){store.principalComments[sid]=val;saveLocalStore();upsertObservation(sid);}

/* ── grade helpers ── */
function total(sid,sub){const s=getScore(sid,sub);const c=parseFloat(s.ca)||0,e=parseFloat(s.exam)||0;if(!s.ca&&!s.exam)return null;return c+e;}
function grade(t){if(t===null)return"-";return t>=70?"A":t>=60?"B":t>=50?"C":t>=45?"D":"F";}
function gradeBadge(g){if(g==="-")return`<span style="color:var(--tx3)">—</span>`;return`<span class="badge badge-${g.toLowerCase()}">${g}</span>`;}
function remark(g){return{A:"Excellent",B:"Good",C:"Satisfactory",D:"Needs Improvement",F:"Fail"}[g]||"";}

/* ── utils ── */
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function avatarColor(n){return["#8B1A2F","#185FA5","#0F6E56","#B57A1A","#534AB7"][n.charCodeAt(0)%5];}
function sectionForClass(cls){for(const[s,a]of Object.entries(CLASSES))if(a.includes(cls))return s;return null;}
function avatar(name,size=28){return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${avatarColor(name)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:${Math.floor(size*.36)}px;font-weight:600;flex-shrink:0">${initials(name)}</div>`;}

/* ── navigation ── */
function nav(page,arg,el){
  _curPage=page; _curArg=arg;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(el?.classList)el.classList.add("active");
  closeSidebar();
  if(page==="dashboard")renderDashboard();
  else if(page==="class")renderSection(arg);
  else if(page==="entry")renderScoreEntry();
  else if(page==="search")renderSearch();
  else if(page==="staff")renderStaffDirectory();
  else if(page==="settings")renderSettings();
  else if(page==="admin")renderAdmin();
}
function setAnnexFilter(val){
  currentAnnexFilter=val;
  if(_curPage==="class")renderSection(_curArg);
  else if(_curPage==="entry")renderScoreEntry();
  else if(_curPage==="staff")renderStaffDirectory();
  else if(_curPage==="admin")renderAdmin();
}
function navToSection(sec){
  const items=[...document.querySelectorAll(".nav-item")];
  const idx={"Pre-Primary":1,"Primary":2,"Junior Secondary":3,"Senior Secondary":4}[sec];
  items.forEach(n=>n.classList.remove("active"));
  if(idx!==undefined)items[idx]?.classList.add("active");
  closeSidebar();
  renderSection(sec);
}

    <div id="admin-tab-content"></div>`;

function switchAdminTab(tab){ _adminTab=tab; renderAdmin(); }
function lockAdmin(){ adminUnlocked=false; renderAdmin(); }

async function submitAdminPin(){
  const pin=document.getElementById("admin-pin")?.value?.trim();
  if(!pin){alert("Enter a PIN");return;}
  const hash=await sha256(pin);
  if(storedPinHash===null){
    const pin2=document.getElementById("admin-pin2")?.value?.trim();
    if(pin!==pin2){alert("PINs do not match");return;}
    const {error}=await dbClient.from("admin_config").upsert({id:1,pin_hash:hash},{onConflict:"id"});
    if(error){alert("Error saving PIN: "+error.message);return;}
    storedPinHash=hash;
  }else if(hash!==storedPinHash){alert("Incorrect PIN");return;}
  adminUnlocked=true; renderAdmin();
}

  const el=document.getElementById("admin-tab-content"); if(!el)return;
  if(_adminTab==="students")el.innerHTML=buildAdminStudentsHtml();
  else if(_adminTab==="staff")el.innerHTML=buildAdminStaffHtml();
  else if(_adminTab==="new-term")el.innerHTML=buildAdminNewTermHtml();
  else if(_adminTab==="security")el.innerHTML=buildAdminSecurityHtml();
}

/* ── admin: student actions ── */
function openAddStudent(){
  const clsOpts=ALL_CLASSES.map(c=>`<option>${c}</option>`).join("");
  const axOpts=annexList.map(a=>`<option value="${a.id}">${a.name}</option>`).join("");
  openModal("Add Student",`
    <div class="field"><label>Full name</label><input id="m-name" placeholder="Surname Firstname" /></div>
    <div class="field"><label>Gender</label><select id="m-gender"><option>Male</option><option>Female</option></select></div>
    <div class="field"><label>Class</label><select id="m-cls">${clsOpts}</select></div>
    <div class="field"><label>Annex</label><select id="m-annex">${axOpts}</select></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitAddStudent()"><i class="ti ti-check"></i> Add</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
  setTimeout(()=>document.getElementById("m-name")?.focus(),50);
}
async function submitAddStudent(){
  const name=document.getElementById("m-name")?.value?.trim();
  const gender=document.getElementById("m-gender")?.value;
  const cls=document.getElementById("m-cls")?.value;
  const annexId=parseInt(document.getElementById("m-annex")?.value);
  if(!name){alert("Enter student name");return;}
  const {data:maxData}=await dbClient.from("students").select("id").gte("id",2001).order("id",{ascending:false}).limit(1);
  const newId=maxData?.length?maxData[0].id+1:2001;
  const sec=CLASS_SECTION[cls]||"Primary";
  await dbClient.from("students").insert({id:newId,name,gender,annex_id:annexId});
  await dbClient.from("enrollments").insert({student_id:newId,cls,sec,annex_id:annexId,status:"active",term:currentTerm,session:currentSession});
  closeModal();
  await loadRoster(); await loadAllStudentsDb();
  renderAdmin();
}
function openEditEnrollment(sid){
  const s=roster.find(x=>x.id===sid); if(!s)return;
  const clsOpts=ALL_CLASSES.map(c=>`<option ${c===s.cls?"selected":""}>${c}</option>`).join("");
  const axOpts=annexList.map(a=>`<option value="${a.id}" ${a.id===s.annex_id?"selected":""}>${a.name}</option>`).join("");
  openModal(`Edit: ${s.name}`,`
    <p style="font-size:12px;color:var(--tx2);margin-bottom:12px">Enrollment for ${currentTerm} · ${currentSession}</p>
    <div class="field"><label>Class</label><select id="m-cls">${clsOpts}</select></div>
    <div class="field"><label>Annex</label><select id="m-annex">${axOpts}</select></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitEditEnrollment(${sid})"><i class="ti ti-check"></i> Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
}
async function submitEditEnrollment(sid){
  const cls=document.getElementById("m-cls")?.value;
  const annexId=parseInt(document.getElementById("m-annex")?.value);
  const sec=CLASS_SECTION[cls]||"Primary";
  await dbClient.from("enrollments").update({cls,sec,annex_id:annexId}).eq("student_id",sid).eq("term",currentTerm).eq("session",currentSession);
  closeModal(); await loadRoster(); renderAdmin();
}
async function confirmMarkLeft(sid,name){
  if(!confirm(`Mark ${name} as "left" for ${currentTerm} ${currentSession}?\nThey will not appear in this term's roster.`))return;
  await dbClient.from("enrollments").update({status:"left"}).eq("student_id",sid).eq("term",currentTerm).eq("session",currentSession);
  await loadRoster(); renderAdmin();
}
async function migrateLocalStudents(){
  if(!confirm(`Migrate all ${STUDENTS.length} hardcoded students to Supabase?\nThey will be enrolled in ${currentTerm} ${currentSession} under the Mushin annex.`))return;
  const studentRows=STUDENTS.map(s=>({id:s.id,name:s.name,gender:s.gender,annex_id:1}));
  await dbClient.from("students").upsert(studentRows,{onConflict:"id"});
  const enrollRows=STUDENTS.map(s=>({student_id:s.id,cls:s.cls,sec:s.sec,annex_id:1,status:"active",term:currentTerm,session:currentSession}));
  await dbClient.from("enrollments").upsert(enrollRows,{onConflict:"student_id,term,session"});
  await loadRoster(); await loadAllStudentsDb(); renderAdmin();
  alert("Migration complete!");
}

/* ── admin: new term init ── */
async function runInitNewTerm(){
  const srcTerm=document.getElementById("src-term")?.value;
  const srcSession=document.getElementById("src-session")?.value?.trim();
  const promote=document.getElementById("do-promote")?.checked;
  if(!srcTerm||!srcSession){alert("Select source term and enter session");return;}
  if(!confirm(`Copy enrollments from ${srcTerm} ${srcSession} → ${currentTerm} ${currentSession}?`))return;
  const {data:srcEnr}=await dbClient.from("enrollments").select("student_id,cls,sec,annex_id").eq("term",srcTerm).eq("session",srcSession).eq("status","active");
  if(srcEnr?.length){
    const newEnr=srcEnr.map(e=>{
      let cls=e.cls,sec=e.sec;
      if(promote){
        const next=PROMOTIONS[cls];
        if(next===null)return null;
        if(next){cls=next;sec=CLASS_SECTION[next]||sec;}
      }
      return{student_id:e.student_id,cls,sec,annex_id:e.annex_id,status:"active",term:currentTerm,session:currentSession};
    }).filter(Boolean);
    if(newEnr.length)await dbClient.from("enrollments").upsert(newEnr,{onConflict:"student_id,term,session"});
  }
  const {data:srcStf}=await dbClient.from("staff_assignments").select("staff_id,annex_id").eq("term",srcTerm).eq("session",srcSession).eq("status","active");
  if(srcStf?.length){
    const newStf=srcStf.map(s=>({staff_id:s.staff_id,annex_id:s.annex_id,term:currentTerm,session:currentSession,status:"active"}));
    await dbClient.from("staff_assignments").upsert(newStf,{onConflict:"staff_id,term,session"});
  }
  await loadRoster(); await loadStaff(); renderAdmin();
  alert(`Done! ${srcEnr?.length||0} student enrollments and ${srcStf?.length||0} staff copied.`);
}

/* ── admin: change PIN ── */
async function runChangePin(){
  const oldPin=document.getElementById("sec-old-pin")?.value?.trim();
  const newPin=document.getElementById("sec-new-pin")?.value?.trim();
  const confirmPin=document.getElementById("sec-confirm-pin")?.value?.trim();
  if(!oldPin||!newPin||!confirmPin){alert("Fill all fields");return;}
  if(newPin!==confirmPin){alert("New PINs do not match");return;}
  const oldHash=await sha256(oldPin);
  if(oldHash!==storedPinHash){alert("Current PIN is incorrect");return;}
  const newHash=await sha256(newPin);
  await dbClient.from("admin_config").upsert({id:1,pin_hash:newHash},{onConflict:"id"});
  storedPinHash=newHash;
  alert("PIN changed successfully");
}

/* ── settings ── */
function renderSettings(){
  document.getElementById("page-title").textContent="Settings";
  document.getElementById("page-meta").textContent="Term management";
  document.getElementById("topbar-actions").innerHTML="";
  const connBadge={connected:`<span class="badge badge-ok">Connected</span>`,error:`<span class="badge badge-err">Connection error</span>`,loading:`<span class="badge badge-neutral">Connecting…</span>`,offline:`<span class="badge badge-neutral">Offline</span>`}[dbStatus];
  document.getElementById("content").innerHTML=`
    <div class="card">
      <div class="card-head"><span class="card-title">Database</span>${connBadge}</div>
      <p style="font-size:12px;color:var(--tx2)">Connected to Debbyfield Schools database automatically.</p>
      ${dbStatus==="error"?`<p style="margin-top:8px;font-size:12px;color:var(--tx-err)">Connection failed — check your internet connection and try refreshing.</p>`:""}
      ${dbStatus==="error"||dbStatus==="offline"?`<button class="btn btn-sm" style="margin-top:10px" onclick="retryConnect()"><i class="ti ti-refresh"></i> Retry connection</button>`:""}
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Active term &amp; session</span></div>
      <p style="font-size:12px;color:var(--tx2);margin-bottom:12px">Currently viewing: <strong>${currentTerm} · ${currentSession}</strong></p>
      <div class="settings-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="field"><label>Term</label>
          <select id="sw-term">${["First Term","Second Term","Third Term"].map(t=>`<option ${t===currentTerm?"selected":""}>${t}</option>`).join("")}</select></div>
        <div class="field"><label>Session (e.g. 2025/2026)</label>
          <input type="text" id="sw-session" value="${currentSession}" placeholder="2025/2026" /></div>
      </div>
      <button class="btn btn-primary" onclick="switchTermSession()"><i class="ti ti-refresh"></i> Switch</button>
      <p style="font-size:11px;color:var(--tx2);margin-top:8px">Previous terms remain in the database and are accessible by switching back.</p>
    </div>`;
}
async function retryConnect(){
  dbStatus="loading"; updateDbIndicator(); renderSettings();
  initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ok=await loadFromSupabase();
  dbStatus=ok?"connected":"error"; updateDbIndicator(); renderSettings();
  if(ok) renderDashboard();
}
async function switchTermSession(){
  const t=document.getElementById("sw-term")?.value;
  const s=document.getElementById("sw-session")?.value?.trim();
  if(!t||!s){alert("Select a term and enter a session.");return;}
  currentTerm=t; currentSession=s;
  localStorage.setItem("dbs-term",t); localStorage.setItem("dbs-session",s);
  store={scores:{},attendance:{},character:{},teacherComments:{},principalComments:{}};
  roster=[...STUDENTS]; staffList=[];
  if(dbClient){dbStatus="loading";updateDbIndicator();const ok=await loadFromSupabase();dbStatus=ok?"connected":"error";}
  else loadLocalStore();
  updateDbIndicator(); updateTermDisplay();
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  document.querySelectorAll(".nav-item")[0]?.classList.add("active");
  renderDashboard();
}

/* ── boot ── */
loadLocalStore(); updateTermDisplay();
dbStatus="loading"; updateDbIndicator(); renderDashboard();
(async()=>{
  initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ok=await loadFromSupabase();
  dbStatus=ok?"connected":"error"; updateDbIndicator(); renderDashboard();
})();
</script>
