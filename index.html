    ?`<button class="btn btn-primary btn-sm" onclick="openAddInventoryItem()"><i class="ti ti-plus"></i> Add Item</button>`:"";

  const lowStock=inventoryItems.filter(i=>{const q=stockCurrentQty(i.id);return q<=i.low_stock_threshold&&q>0;});
  const outOfStock=inventoryItems.filter(i=>stockCurrentQty(i.id)<=0);
  const termRevenue=stockTermRevenue();
  const termTxns=inventoryTxns.filter(t=>t.term===currentTerm&&t.session===currentSession);

  document.getElementById("content").innerHTML=`
    ${(outOfStock.length||lowStock.length)?`
    <div class="card" style="border-color:var(--tx-warn);margin-bottom:14px">
      <div class="card-head"><span class="card-title" style="color:var(--tx-warn)"><i class="ti ti-alert-triangle"></i> Stock alerts</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${outOfStock.map(i=>`<span style="background:var(--bg-err);color:var(--tx-err);padding:3px 10px;border-radius:20px;font-size:11px">${i.item_name} — OUT</span>`).join("")}
        ${lowStock.map(i=>`<span style="background:var(--bg-warn);color:var(--tx-warn);padding:3px 10px;border-radius:20px;font-size:11px">${i.item_name} — ${stockCurrentQty(i.id)} left</span>`).join("")}
      </div>
    </div>`:""}
    <div class="stats-row" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div class="stat"><div class="stat-label">Items tracked</div><div class="stat-val">${inventoryItems.length}</div></div>
      <div class="stat"><div class="stat-label">Sales revenue this term</div><div class="stat-val" style="color:var(--tx-ok)">₦${termRevenue.toLocaleString()}</div></div>
      <div class="stat"><div class="stat-label">Transactions this term</div><div class="stat-val">${termTxns.length}</div></div>
    </div>
    ${!canDo('admin')?signInNotice('record sales and stock movements'):""}
    ${inventoryItems.length===0
      ?`<div class="card"><div class="empty"><i class="ti ti-package-off"></i>No items yet${canDo('principal')?" — click Add Item to start":""}</div></div>`
      :`<div class="stock-grid">
        ${inventoryItems.map(item=>{
          const qty=stockCurrentQty(item.id);
          return`<div class="stock-card">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div>
                <div style="font-weight:600;font-size:13px">${item.item_name}</div>
                <div style="font-size:11px;color:var(--tx3);margin-top:2px">${item.category}</div>
              </div>
              ${stockQtyBadge(qty,item.low_stock_threshold)}
            </div>
            <div style="font-size:12px;color:var(--tx2)">₦${parseFloat(item.unit_price).toLocaleString()} / unit</div>
            ${canDo('admin')?`
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px">
              <button class="btn btn-sm btn-primary" style="font-size:11px;padding:4px 9px" onclick="openSaleModal(${item.id})"><i class="ti ti-shopping-cart"></i> Sell</button>
              <button class="btn btn-sm" style="font-size:11px;padding:4px 9px" onclick="openStockIn(${item.id})"><i class="ti ti-package-import"></i> Stock In</button>
              <button class="btn btn-sm" style="font-size:11px;padding:4px 9px" onclick="openAdjustStock(${item.id})"><i class="ti ti-adjustments"></i> Adjust</button>
              ${canDo('principal')?`
              <button class="btn btn-sm" style="font-size:11px;padding:4px 9px;margin-left:auto" onclick="openEditInventoryItem(${item.id})"><i class="ti ti-pencil"></i></button>
              <button class="btn btn-sm" style="font-size:11px;padding:4px 9px;color:var(--tx-err)" onclick="deleteInventoryItem(${item.id},'${item.item_name.replace(/'/g,"\\'")}')"><i class="ti ti-trash"></i></button>
              `:""}
            </div>`:""}
          </div>`;
        }).join("")}
      </div>`}
    <div class="card">
      <div class="card-head">
        <span class="card-title">Transactions — ${currentTerm}</span>
        <span style="font-size:11px;color:var(--tx3)">${termTxns.length} entries</span>
      </div>
      ${termTxns.length===0
        ?`<div class="empty"><i class="ti ti-list-search"></i>No transactions this term</div>`
        :`<div style="overflow-x:auto"><table>
          <thead><tr><th>Date</th><th>Item</th><th>Type</th><th>Qty</th><th>Unit ₦</th><th>Total</th><th>Note</th>${canDo('principal')?'<th></th>':''}</tr></thead>
          <tbody>${termTxns.map(t=>{
            const item=inventoryItems.find(i=>i.id===t.item_id);
            const typeStyle=t.transaction_type==='sale'?'color:var(--tx-ok)'
              :t.transaction_type==='stock_in'?'color:var(--tx-info)':'color:var(--tx-warn)';
            const typeLabel={'stock_in':'Stock In','sale':'Sale','adjustment':'Adjust'}[t.transaction_type]||t.transaction_type;
            const qtyDisplay=t.quantity>0?`+${t.quantity}`:String(t.quantity);
            return`<tr>
              <td style="white-space:nowrap">${t.transaction_date}</td>
              <td style="font-weight:500">${item?item.item_name:"—"}</td>
              <td><span style="font-size:11px;${typeStyle}">${typeLabel}</span>${t.student_name?`<div style="font-size:10px;color:var(--tx3)">${t.student_name}</div>`:""}</td>
              <td style="font-weight:600">${qtyDisplay}</td>
              <td style="color:var(--tx2)">₦${parseFloat(t.unit_price||0).toLocaleString()}</td>
              <td style="font-weight:600;${t.transaction_type==='sale'?'color:var(--tx-ok)':''}">₦${parseFloat(t.total_value||0).toLocaleString()}</td>
              <td style="color:var(--tx3);font-size:11px;max-width:120px">${t.note||"—"}</td>
              ${canDo('principal')?`<td><button class="btn btn-sm" style="color:var(--tx-err);padding:3px 7px" onclick="deleteInventoryTxn(${t.id})"><i class="ti ti-trash"></i></button></td>`:""}
            </tr>`;}).join("")}
          </tbody></table></div>`}
    </div>`;
}

function openEditInventoryItem(id){
  if(!canDo('principal')){alert("Principal access required");return;}

  openModal("Edit Item",inventoryItemForm(item)+`

function readInventoryItemForm(){
  return{
    item_name:document.getElementById("inv-name")?.value?.trim(),
    category:document.getElementById("inv-cat")?.value,
    unit_price:parseFloat(document.getElementById("inv-price")?.value)||0,
    low_stock_threshold:parseInt(document.getElementById("inv-thresh")?.value)||5,

async function submitAddInventoryItem(){
  const d=readInventoryItemForm();
  if(!d.item_name){alert("Enter an item name");return;}
  const{error}=await dbClient.from("inventory_items").insert(d);
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadInventoryItems(); renderInventory();
}
async function submitEditInventoryItem(id){
  const d=readInventoryItemForm();
  if(!d.item_name){alert("Enter an item name");return;}
  const{error}=await dbClient.from("inventory_items").update(d).eq("id",id);
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadInventoryItems(); renderInventory();
}
async function deleteInventoryItem(id,name){
  if(!canDo('principal')){alert("Principal access required");return;}
  if(!confirm(`Delete "${name}" and all its transaction history?`))return;
  await dbClient.from("inventory_items").delete().eq("id",id);
  await Promise.all([loadInventoryItems(),loadInventoryTxns()]); renderInventory();
}
async function deleteInventoryTxn(id){
  if(!canDo('principal')){alert("Principal access required");return;}
  if(!confirm("Delete this transaction?"))return;
  await dbClient.from("inventory_transactions").delete().eq("id",id);
  await loadInventoryTxns(); renderInventory();
}

async function submitSale(itemId){
  const qty=parseInt(document.getElementById("sale-qty")?.value);
  const price=parseFloat(document.getElementById("sale-price")?.value)||0;
  const date=document.getElementById("sale-date")?.value;
  const studentName=document.getElementById("sale-student")?.value?.trim()||null;
  const note=document.getElementById("sale-note")?.value?.trim()||null;
  if(!qty||qty<=0){alert("Enter a valid quantity");return;}
  const currentQty=stockCurrentQty(itemId);
  if(currentQty>0&&qty>currentQty){if(!confirm(`Only ${currentQty} in stock. Record sale anyway?`))return;}
  const{error}=await dbClient.from("inventory_transactions").insert({
    item_id:itemId, transaction_type:"sale", quantity:-qty,
    unit_price:price, total_value:qty*price, student_name:studentName, note,
    transaction_date:date, term:currentTerm, session:currentSession,
  });
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadInventoryTxns(); renderInventory();
}

/* ── attendance summary ── */
function renderAttendanceSummary(){
  document.getElementById("page-title").textContent="Attendance Summary";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  document.getElementById("topbar-actions").innerHTML="";
  if(!dbClient){
    document.getElementById("content").innerHTML=`<div class="empty"><i class="ti ti-plug-off"></i>Connect Supabase to view attendance data</div>`;return;
  }
  const classes=Object.values(CLASSES).flat();
  const clsGroups=classes.map(cls=>{
    const students=roster.filter(s=>s.cls===cls);
    if(!students.length)return null;
    const rows=students.sort((a,b)=>a.name.localeCompare(b.name)).map(s=>{
      const a=getAtt(s.id);
      const pct=a.present&&a.total?Math.round(parseInt(a.present)/parseInt(a.total)*100):null;
      const color=pct===null?"var(--tx3)":pct>=80?"var(--tx-ok)":pct>=60?"var(--tx-warn)":"var(--tx-err)";
      return`<tr>
        <td><div style="display:flex;align-items:center;gap:8px">${avatar(s.name,24)}${s.name}</div></td>
        <td style="text-align:center">${a.total||57}</td>
        <td style="text-align:center">${a.present||"—"}</td>
        <td style="text-align:center;font-weight:600;color:${color}">${pct!==null?pct+"%":"—"}</td>
      </tr>`;
    }).join("");
    return{cls,rows,count:students.length};
  }).filter(Boolean);

  const clsFilter=document.getElementById("att-sum-cls-filter")?.value||"";
  const toShow=clsFilter?clsGroups.filter(g=>g.cls===clsFilter):clsGroups;

  document.getElementById("content").innerHTML=`
    <div class="filter-bar" style="margin-bottom:14px">
      <select id="att-sum-cls-filter" onchange="renderAttendanceSummary()" style="width:auto">
        <option value="">All classes</option>
        ${classes.map(c=>`<option value="${c}"${c===clsFilter?" selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    ${toShow.length?toShow.map(g=>`
      <div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">
        <div style="padding:10px 14px;border-bottom:.5px solid var(--bd3);background:var(--bg2);display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:600;font-size:13px">${g.cls}</span>
          <span style="font-size:11px;color:var(--tx2)">${g.count} student${g.count!==1?"s":""}</span>
        </div>
        <table><thead><tr><th>Name</th><th style="text-align:center">Total Days</th><th style="text-align:center">Present</th><th style="text-align:center">%</th></tr></thead>
        <tbody>${g.rows}</tbody></table>
      </div>`).join("")
    :`<div class="empty"><i class="ti ti-users"></i>No students enrolled this term</div>`}`;
}

  document.getElementById("page-title").textContent="Activities Overview";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  document.getElementById("topbar-actions").innerHTML="";
  const trackStats=ACTIVITY_TRACKS.map(t=>{
    const members=activityMemberships.filter(m=>m.track===t);
    const captain=members.find(m=>m.role==="captain");
    const capName=captain?roster.find(s=>s.id===captain.student_id)?.name||"—":"—";
    const sessionCount=activitySessions.filter(s=>s.track===t).length;
    const compCount=activityCompetitions.filter(c=>c.track===t||c.track==="General").length;
    return{track:t,memberCount:members.length,captain:capName,sessionCount,compCount};
  });
  document.getElementById("content").innerHTML=`
    <div class="track-overview-grid">
      ${trackStats.map(ts=>`
        <div class="track-overview-card">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="track-pill ${trackCss(ts.track)}">${ts.track}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--tx2)">
            <div><span style="font-weight:600;font-size:20px;color:var(--tx)">${ts.memberCount}</span> members</div>
            <div>Captain: <span style="color:var(--tx)">${ts.captain}</span></div>
            <div>${ts.sessionCount} session${ts.sessionCount!==1?"s":""} logged &nbsp;·&nbsp; ${ts.compCount} competition${ts.compCount!==1?"s":""}</div>
          </div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn btn-sm" onclick="nav('act-members',null,document.querySelector('.nav-item:nth-child(2)'))">Members</button>
          </div>
        </div>`).join("")}
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val">${activityMemberships.length}</div><div class="stat-lbl">Total memberships</div></div>
      <div class="stat"><div class="stat-val">${activitySessions.length}</div><div class="stat-lbl">Sessions logged</div></div>
      <div class="stat"><div class="stat-val">${activityCompetitions.length}</div><div class="stat-lbl">Competitions</div></div>
      <div class="stat"><div class="stat-val">${[...new Set(activityMemberships.map(m=>m.student_id))].length}</div><div class="stat-lbl">Students enrolled</div></div>
    </div>`;
}

/* ── activities: memberships ── */
function renderActivityMemberships(){
  document.getElementById("page-title").textContent="Track Memberships";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  const canEdit=canDo('admin');
  document.getElementById("topbar-actions").innerHTML=canEdit
    ?`<button class="btn btn-primary" onclick="openAddMembership()"><i class="ti ti-plus"></i> Assign Student</button>`:""  ;
  const trackFilter=document.getElementById("mem-track-filter")?.value||"";
  const shown=trackFilter?activityMemberships.filter(m=>m.track===trackFilter):activityMemberships;
  const rows=shown.map(m=>{
    const s=roster.find(x=>x.id===m.student_id)||{name:`ID ${m.student_id}`,cls:"—"};
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${avatar(s.name,24)}${s.name}</div></td>
      <td style="color:var(--tx2);font-size:12px">${s.cls||"—"}</td>
      <td><span class="track-pill ${trackCss(m.track)}">${m.track}</span></td>
      <td><span class="badge badge-neutral" style="text-transform:capitalize">${m.role}</span></td>
      ${canEdit?`<td><button class="btn btn-sm" style="color:var(--tx-err)" onclick="deleteMembership(${m.id},'${s.name}')"><i class="ti ti-trash"></i></button></td>`:"<td></td>"}
    </tr>`;
  }).join("");
  document.getElementById("content").innerHTML=`
    ${!canEdit?signInNotice("manage memberships"):""}
    <div class="filter-bar">
      <select id="mem-track-filter" onchange="renderActivityMemberships()" style="width:auto">
        <option value="">All tracks</option>
        ${ACTIVITY_TRACKS.map(t=>`<option value="${t}"${t===trackFilter?" selected":""}>${t}</option>`).join("")}
      </select>
    </div>
    ${shown.length?`<div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr><th>Student</th><th>Class</th><th>Track</th><th>Role</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`
    :`<div class="empty"><i class="ti ti-users"></i>No memberships yet${trackFilter?" for this track":""}</div>`}`;
}

function openAddMembership(){
  if(!canDo('admin')){alert("Sign in first");return;}
  const studentOpts=roster.sort((a,b)=>a.name.localeCompare(b.name))
    .map(s=>`<option value="${s.id}">${s.name} (${s.cls})</option>`).join("");
  openModal("Assign Student to Track",`
    <div class="field"><label>Student</label>
      <select id="mem-sid"><option value="">— Select student —</option>${studentOpts}</select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Track</label>
        <select id="mem-track">
          ${ACTIVITY_TRACKS.map(t=>`<option value="${t}">${t}</option>`).join("")}
        </select></div>
      <div class="field"><label>Role</label>
        <select id="mem-role">
          ${TRACK_ROLES.map(r=>`<option value="${r}" style="text-transform:capitalize">${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join("")}
        </select></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitAddMembership()"><i class="ti ti-check"></i> Assign</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
}

async function submitAddMembership(){
  const sid=parseInt(document.getElementById("mem-sid")?.value);
  const track=document.getElementById("mem-track")?.value;
  const role=document.getElementById("mem-role")?.value;
  if(!sid){alert("Select a student");return;}
  const{error}=await dbClient.from("activity_memberships").upsert(
    {student_id:sid,track,role,term:currentTerm,session:currentSession},
    {onConflict:"student_id,track,term,session"});
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadActivityMemberships(); renderActivityMemberships();
}

async function deleteMembership(id,name){
  if(!confirm(`Remove ${name} from this track?`))return;
  const{error}=await dbClient.from("activity_memberships").delete().eq("id",id);
  if(error){alert("Error: "+error.message);return;}
  await loadActivityMemberships(); renderActivityMemberships();
}

/* ── activities: sessions ── */
function renderActivitySessions(){
  document.getElementById("page-title").textContent="Session Logs";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  const canEdit=canDo('admin');
  document.getElementById("topbar-actions").innerHTML=canEdit
    ?`<button class="btn btn-primary" onclick="openLogSession()"><i class="ti ti-plus"></i> Log Session</button>`:"";
  const rows=activitySessions.map(s=>`
    <tr>
      <td>${s.session_date}</td>
      <td><span class="track-pill ${trackCss(s.track)}">${s.track}</span></td>
      <td>${s.topic||"—"}</td>
      <td style="text-align:center">${s.attendance_count||"—"}</td>
      <td style="color:var(--tx2);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.notes||""}</td>
      ${canEdit?`<td><button class="btn btn-sm" style="color:var(--tx-err)" onclick="deleteActivitySession(${s.id})"><i class="ti ti-trash"></i></button></td>`:"<td></td>"}
    </tr>`).join("");
  document.getElementById("content").innerHTML=`
    ${!canEdit?signInNotice("log sessions"):""}
    ${activitySessions.length
      ?`<div class="card" style="padding:0;overflow:hidden">
          <table><thead><tr><th>Date</th><th>Track</th><th>Topic</th><th style="text-align:center">Attendance</th><th>Notes</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table></div>`
      :`<div class="empty"><i class="ti ti-clipboard-list"></i>No sessions logged yet</div>`}`;
}

function openLogSession(){
  if(!canDo('admin')){alert("Sign in first");return;}
  const today=new Date().toISOString().split("T")[0];
  openModal("Log Session",`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Track</label>
        <select id="ses-track">${ACTIVITY_TRACKS.map(t=>`<option value="${t}">${t}</option>`).join("")}</select></div>
      <div class="field"><label>Date</label>
        <input type="date" id="ses-date" value="${today}"></div>
    </div>
    <div class="field"><label>Topic / Activity</label>
      <input id="ses-topic" placeholder="e.g. Debate prep, Science quiz drill…"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Students attended</label>
        <input type="number" id="ses-count" min="0" placeholder="0"></div>
      <div class="field" style="grid-column:1/-1"><label>Notes</label>
        <input id="ses-notes" placeholder="Any observations…"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitLogSession()"><i class="ti ti-check"></i> Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
  setTimeout(()=>document.getElementById("ses-topic")?.focus(),50);
}

async function submitLogSession(){
  const track=document.getElementById("ses-track")?.value;
  const session_date=document.getElementById("ses-date")?.value;
  const topic=document.getElementById("ses-topic")?.value?.trim()||null;
  const attendance_count=parseInt(document.getElementById("ses-count")?.value)||0;
  const notes=document.getElementById("ses-notes")?.value?.trim()||null;
  if(!session_date){alert("Select a date");return;}
  const{error}=await dbClient.from("activity_sessions").insert(
    {track,session_date,topic,attendance_count,notes,term:currentTerm,session:currentSession});
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadActivitySessions(); renderActivitySessions();
}

async function deleteActivitySession(id){
  if(!confirm("Delete this session log?"))return;
  const{error}=await dbClient.from("activity_sessions").delete().eq("id",id);
  if(error){alert("Error: "+error.message);return;}
  await loadActivitySessions(); renderActivitySessions();
}

/* ── activities: competitions ── */
function renderActivityCompetitions(){
  document.getElementById("page-title").textContent="Competitions";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  const canEdit=canDo('admin');
  document.getElementById("topbar-actions").innerHTML=canEdit
    ?`<button class="btn btn-primary" onclick="openLogCompetition()"><i class="ti ti-plus"></i> Log Result</button>`:"";
  const levelBadge={internal:"badge-neutral",
    "inter-school":"badge-b","regional":"badge-c","national":"badge-ok"};
  const rows=activityCompetitions.map(c=>`
    <tr>
      <td>${c.competition_date||"—"}</td>
      <td style="font-weight:500">${c.title}</td>
      <td>${c.track?`<span class="track-pill ${trackCss(c.track)}">${c.track}</span>`:"—"}</td>
      <td><span class="badge ${levelBadge[c.level]||"badge-neutral"}" style="text-transform:capitalize">${c.level}</span></td>
      <td style="font-weight:600;color:${c.position==="1st"||c.position==="1"?"var(--tx-ok)":"var(--tx)"}">${c.position||"—"}</td>
      <td style="color:var(--tx2);font-size:12px">${c.participants||""}</td>
      ${canEdit?`<td><button class="btn btn-sm" style="color:var(--tx-err)" onclick="deleteCompetition(${c.id})"><i class="ti ti-trash"></i></button></td>`:"<td></td>"}
    </tr>`).join("");
  document.getElementById("content").innerHTML=`
    ${!canEdit?signInNotice("log competitions"):""}
    ${activityCompetitions.length
      ?`<div class="card" style="padding:0;overflow:hidden">
          <table><thead><tr><th>Date</th><th>Event</th><th>Track</th><th>Level</th><th>Position</th><th>Participants</th><th></th></tr></thead>
          <tbody>${rows}</tbody></table></div>`
      :`<div class="empty"><i class="ti ti-award"></i>No competitions logged yet</div>`}`;
}

function openLogCompetition(){
  if(!canDo('admin')){alert("Sign in first");return;}
  const today=new Date().toISOString().split("T")[0];
  openModal("Log Competition Result",`
    <div class="field"><label>Event Title</label>
      <input id="comp-title" placeholder="e.g. Inter-school Debate 2025…"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Track</label>
        <select id="comp-track">
          <option value="General">General / School</option>
          ${ACTIVITY_TRACKS.map(t=>`<option value="${t}">${t}</option>`).join("")}
        </select></div>
      <div class="field"><label>Date</label>
        <input type="date" id="comp-date" value="${today}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Level</label>
        <select id="comp-level">
          <option value="internal">Internal</option>
          <option value="inter-school">Inter-school</option>
          <option value="regional">Regional</option>
          <option value="national">National</option>
        </select></div>
      <div class="field"><label>Position / Result</label>
        <input id="comp-pos" placeholder="e.g. 1st, Runner-up, Finalist…"></div>
    </div>
    <div class="field"><label>Participants (names)</label>
      <input id="comp-participants" placeholder="Student names or count…"></div>
    <div class="field"><label>Notes</label>
      <input id="comp-notes" placeholder="Any other details…"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitLogCompetition()"><i class="ti ti-check"></i> Save</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
  setTimeout(()=>document.getElementById("comp-title")?.focus(),50);
}

async function submitLogCompetition(){
  const title=document.getElementById("comp-title")?.value?.trim();
  const track=document.getElementById("comp-track")?.value;
  const competition_date=document.getElementById("comp-date")?.value||null;
  const level=document.getElementById("comp-level")?.value;
  const position=document.getElementById("comp-pos")?.value?.trim()||null;
  const participants=document.getElementById("comp-participants")?.value?.trim()||null;
  const notes=document.getElementById("comp-notes")?.value?.trim()||null;
  if(!title){alert("Enter an event title");return;}
  const{error}=await dbClient.from("activity_competitions").insert(
    {title,track,competition_date,level,position,participants,notes,term:currentTerm,session:currentSession});
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadActivityCompetitions(); renderActivityCompetitions();
}

async function deleteCompetition(id){
  if(!confirm("Delete this competition record?"))return;
  const{error}=await dbClient.from("activity_competitions").delete().eq("id",id);
  if(error){alert("Error: "+error.message);return;}
  await loadActivityCompetitions(); renderActivityCompetitions();
}

/* ── school calendar ── */
function renderCalendar(){
  document.getElementById("page-title").textContent="School Calendar";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  const canEdit=canDo('admin');
  document.getElementById("topbar-actions").innerHTML=canEdit
    ?`<button class="btn btn-primary" onclick="openAddEvent()"><i class="ti ti-plus"></i> Add Event</button>`:"";

  if(!schoolEvents.length){
    document.getElementById("content").innerHTML=`
      ${!canEdit?signInNotice("add events"):""}
      <div class="empty"><i class="ti ti-calendar-event"></i>No events for this term yet${canEdit?" — click Add Event to start":""}</div>`;
    return;
  }

  const typeColor={academic:"evt-academic",activities:"evt-activities",holiday:"evt-holiday",meeting:"evt-meeting",other:"evt-other"};
  const typeLabel={academic:"Academic",activities:"Activities",holiday:"Holiday",meeting:"Meeting",other:"Other"};

  // group by month
  const byMonth={};
  schoolEvents.forEach(e=>{
    const m=e.event_date?e.event_date.slice(0,7):"unknown";
    if(!byMonth[m])byMonth[m]=[];
    byMonth[m].push(e);
  });

  const monthName=m=>{
    try{const[y,mo]=m.split("-");return new Date(parseInt(y),parseInt(mo)-1,1).toLocaleString("default",{month:"long",year:"numeric"});}
    catch{return m;}
  };

  document.getElementById("content").innerHTML=`
    ${!canEdit?signInNotice("add events"):""}
    <div class="card">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
        ${Object.entries(typeLabel).map(([k,v])=>`<span><span class="cal-event-dot ${typeColor[k]||"evt-other"}" style="display:inline-block"></span>${v}</span>`).join("")}
      </div>
      ${Object.entries(byMonth).map(([m,events])=>`
        <div class="cal-month-hdr">${monthName(m)}</div>
        ${events.map(e=>`
          <div class="cal-event-row">
            <div class="cal-event-dot ${typeColor[e.event_type]||"evt-other"}" style="margin-top:5px"></div>
            <div style="flex:1;min-width:0">
              <div style="font-weight:500;font-size:13px">${e.title}</div>
              <div style="font-size:11px;color:var(--tx2)">${e.event_date}${e.end_date&&e.end_date!==e.event_date?" – "+e.end_date:""}${e.description?" · "+e.description:""}</div>
            </div>
            <span class="badge badge-neutral" style="font-size:10px;text-transform:capitalize;flex-shrink:0">${typeLabel[e.event_type]||e.event_type}</span>
            ${canEdit?`<button class="btn btn-sm" style="color:var(--tx-err);padding:4px 8px" onclick="deleteEvent(${e.id})"><i class="ti ti-trash"></i></button>`:""}
          </div>`).join("")}`).join("")}
    </div>`;
}

function openAddEvent(){
  if(!canDo('admin')){alert("Sign in first");return;}
  const today=new Date().toISOString().split("T")[0];
  openModal("Add Event",`
    <div class="field"><label>Title</label>
      <input id="ev-title" placeholder="e.g. Mid-term break, Debate Day…"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field"><label>Start Date</label>
        <input type="date" id="ev-start" value="${today}"></div>
      <div class="field"><label>End Date (if multi-day)</label>
        <input type="date" id="ev-end"></div>
    </div>
    <div class="field"><label>Type</label>
      <select id="ev-type">
        <option value="academic">Academic</option>
        <option value="activities">Activities / EDGE</option>
        <option value="holiday">Holiday</option>
        <option value="meeting">Meeting</option>
        <option value="other">Other</option>
      </select></div>
    <div class="field"><label>Description (optional)</label>
      <input id="ev-desc" placeholder="Brief note…"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-primary" onclick="submitAddEvent()"><i class="ti ti-check"></i> Add</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>`);
  setTimeout(()=>document.getElementById("ev-title")?.focus(),50);
}

async function submitAddEvent(){
  const title=document.getElementById("ev-title")?.value?.trim();
  const event_date=document.getElementById("ev-start")?.value;
  const end_date=document.getElementById("ev-end")?.value||null;
  const event_type=document.getElementById("ev-type")?.value;
  const description=document.getElementById("ev-desc")?.value?.trim()||null;
  if(!title){alert("Enter a title");return;}
  if(!event_date){alert("Select a date");return;}
  const{error}=await dbClient.from("school_events").insert(
    {title,event_date,end_date,event_type,description,term:currentTerm,session:currentSession});
  if(error){alert("Error: "+error.message);return;}
  closeModal(); await loadSchoolEvents(); renderCalendar();
}

async function deleteEvent(id){
  if(!confirm("Delete this event?"))return;
  const{error}=await dbClient.from("school_events").delete().eq("id",id);
  if(error){alert("Error: "+error.message);return;}
  await loadSchoolEvents(); renderCalendar();
}

/* ── boot ── */
loadLocalStore(); updateTermDisplay();
dbStatus="loading"; updateDbIndicator(); renderHub();
(async()=>{
  initSupabase(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ok=await loadFromSupabase();
  dbStatus=ok?"connected":"error"; updateDbIndicator();
  if(!_curSection) renderHub();
})();
</script>
