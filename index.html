<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debbyfield Operational System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-docx@1.8.0/dist/html-to-docx.browser.consolidated.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}})()</script>
  <style>
    :root {
      --burg:#8B1A2F; --gold:#C9A84C; --navy:#1E3566; --cream:#F5EBD0; --brown:#8B6340; --r:6px;
      --font-sans:'Inter',system-ui,-apple-system,sans-serif;
      --bg:#fefcf8; --bg2:#f4ead8;
      --bg-ok:#e8f5e9; --bg-info:#e3f2fd; --bg-warn:#fff8e1; --bg-err:#ffebee;
      --tx:#111827; --tx2:#6b7280; --tx3:#9ca3af;
      --tx-ok:#16a34a; --tx-info:#1d4ed8; --tx-warn:#d97706; --tx-err:#dc2626;
      --bd:#a89a88; --bd2:#c9bba4; --bd3:#e0d4be;
      --rmd:6px; --rlg:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--font-sans);font-size:14px;background:#c8b59a;display:flex;align-items:center;justify-content:center;min-height:100vh}

    /* ── app shell ── */
    .app{display:grid;grid-template-columns:214px 1fr;width:100%;max-width:1120px;height:96vh;border:.5px solid var(--bd3);border-radius:var(--rlg);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.09)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

    /* ── sidebar ── */
    .sidebar{background:var(--bg2);border-right:.5px solid var(--bd3);display:flex;flex-direction:column;overflow-y:auto}
    .logo{padding:14px 16px 12px;border-bottom:.5px solid var(--bd3);border-top:3px solid var(--navy)}
    .logo-name{font-size:13px;font-weight:600;color:var(--tx)}
    .logo-term{font-size:11px;color:var(--tx2);margin-top:2px}
    .db-row{display:flex;align-items:center;gap:5px;margin-top:6px}
    .db-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .dot-off{background:var(--tx3)} .dot-ok{background:var(--tx-ok)} .dot-err{background:var(--tx-err)} .dot-spin{background:var(--tx-warn)}
    .db-lbl{font-size:10px;color:var(--tx3)}
    .nav-section{padding:8px 8px 0}
    .nav-label{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;padding:6px 8px 4px}
    .nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--tx2);transition:background .15s;user-select:none}
    .nav-item:hover{background:var(--bg)}
    .nav-item.active{background:var(--bg);color:var(--navy);font-weight:500}
    .nav-item i{font-size:15px;opacity:.7}
    .nav-item.active i{color:var(--navy);opacity:1}

    /* ── main ── */
    .main{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:.5px solid var(--bd3);flex-shrink:0;gap:8px}
    .topbar-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
    .topbar-text{min-width:0}
    .topbar-title{font-size:15px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-meta{font-size:12px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .save-indicator{font-size:11px;color:var(--tx2);white-space:nowrap;flex-shrink:0}
    .content{flex:1;overflow-y:auto;padding:16px}

    /* hamburger — hidden on desktop */
    .hamburger{display:none;align-items:center;justify-content:center;width:34px;height:34px;border:none;background:none;cursor:pointer;color:var(--tx);border-radius:var(--r);flex-shrink:0}
    .hamburger:hover{background:var(--bg2)}
    .hamburger i{font-size:20px}

    /* ── buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-size:13px;font-family:var(--font-sans);cursor:pointer;transition:background .15s}
    .btn:hover{background:var(--bg2)}
    .btn-primary{background:var(--burg);border-color:var(--burg);color:#fff}
    .btn-primary:hover{background:#6d1424}
    .btn-sm{padding:5px 10px;font-size:12px}

    /* ── badges ── */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
    .badge-a{background:var(--bg-ok);color:var(--tx-ok)} .badge-b{background:var(--bg-info);color:var(--tx-info)}
    .badge-c{background:var(--bg-warn);color:var(--tx-warn)} .badge-d{background:var(--bg-warn);color:var(--tx-warn)}
    .badge-f{background:var(--bg-err);color:var(--tx-err)} .badge-ok{background:var(--bg-ok);color:var(--tx-ok)}
    .badge-err{background:var(--bg-err);color:var(--tx-err)} .badge-neutral{background:var(--bg2);color:var(--tx2)}

    /* ── cards ── */
    .card{background:var(--bg);border:.5px solid var(--bd3);border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px}
    .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
    .card-title{font-size:13px;font-weight:600;color:var(--tx)}

    /* ── stats ── */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
    .stat{background:var(--bg2);border-radius:var(--r);padding:10px 12px}
    .stat-val{font-size:22px;font-weight:600;color:var(--tx)}
    .stat-lbl{font-size:11px;color:var(--tx2);margin-top:2px}
    .stat-label{font-size:11px;color:var(--tx3);margin-bottom:2px}

    /* ── table ── */
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;color:var(--tx2);border-bottom:.5px solid var(--bd3);white-space:nowrap}
    td{padding:8px 10px;border-bottom:.5px solid var(--bd3);color:var(--tx)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg2)}
    .trow-click{cursor:pointer}

    /* ── forms ── */
    input,select,textarea{font-family:var(--font-sans);font-size:13px;color:var(--tx);background:var(--bg);border:.5px solid var(--bd2);border-radius:var(--r);padding:7px 10px;width:100%}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--burg)}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:4px}

    /* ── score rows (student detail) ── */
    .srow-hdr{display:flex;align-items:center;padding:0 0 8px;border-bottom:.5px solid var(--bd3);margin-bottom:4px;gap:8px}
    .srow-hdr-name{flex:1;font-size:11px;font-weight:500;color:var(--tx2)}
    .srow-hdr-fields{display:grid;grid-template-columns:80px 80px 80px 70px;gap:8px}
    .srow-hdr-fields span{font-size:11px;font-weight:500;color:var(--tx2);text-align:center}
    .srow{display:flex;align-items:center;padding:7px 0;border-bottom:.5px solid var(--bd3);gap:8px}
    .srow:last-child{border-bottom:none}
    .srow-name{flex:1;font-size:13px;min-width:0}
    .srow-fields{display:grid;grid-template-columns:80px 80px 80px 70px;gap:8px;align-items:center;flex-shrink:0}
    .srow-fields span{text-align:center}
    .score-input{padding:5px 8px;text-align:center;width:100%}
    .mobile-field-labels{display:none;grid-template-columns:1fr 1fr 56px 48px;gap:6px;margin-bottom:2px}
    .mobile-field-labels span{font-size:10px;color:var(--tx2);text-align:center}

    /* ── search ── */
    .search-bar{display:flex;gap:8px;margin-bottom:14px}
    .search-bar input{flex:1}

    /* ── empty ── */
    .empty{text-align:center;padding:40px;color:var(--tx2)}
    .empty i{font-size:32px;margin-bottom:8px;display:block;opacity:.4}

    /* ── report card ── */
    .rc{background:var(--bg);max-width:640px;margin:0 auto}
    .rc-header{border-bottom:2px solid var(--burg);padding-bottom:12px;margin-bottom:14px}
    .rc-school{font-size:17px;font-weight:700;color:var(--burg);text-align:center}
    .rc-addr{font-size:11px;color:var(--tx2);text-align:center;margin-top:2px}
    .rc-title{font-size:18px;font-weight:600;text-align:center;margin:8px 0 4px;color:var(--tx)}
    .rc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:12px;margin-bottom:14px}
    .rc-info-row{display:flex;gap:6px}
    .rc-info-label{color:var(--tx2);min-width:80px}
    .rc-info-val{color:var(--tx);font-weight:600}
    .rc-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px}
    .rc-table th{background:var(--bg2);padding:7px 10px;text-align:left;border:.5px solid var(--bd3);font-size:11px;font-weight:500;color:var(--tx2)}
    .rc-table td{padding:6px 10px;border:.5px solid var(--bd3);color:var(--tx)}
    .att-row{display:flex;gap:20px;font-size:12px;margin-bottom:14px;flex-wrap:wrap}
    .att-item{display:flex;flex-direction:column;gap:2px}
    .att-item span:first-child{color:var(--tx2);font-size:11px}
    .att-item span:last-child{font-weight:600}
    .char-box{background:var(--bg2);border-left:3px solid var(--brown);border-radius:0 var(--r) var(--r) 0;padding:10px 12px;margin-bottom:14px;font-size:12px}
    .char-label{font-size:10px;font-weight:600;color:var(--brown);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
    .comment-row{margin-bottom:10px;font-size:12px}
    .comment-label{font-size:10px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
    .sig-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:.5px solid var(--bd3);font-size:11px;color:var(--tx2)}

    /* ── settings ── */
    .setup-step{display:flex;gap:10px;margin-bottom:10px;font-size:12px}
    .setup-num{width:20px;height:20px;border-radius:50%;background:var(--burg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}

    /* ── attendance register ── */
    .att-btn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--bd2);background:var(--bg2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx3);transition:all .15s}
    .att-btn:hover{border-color:var(--bd);background:var(--bg);color:var(--tx2)}
    .att-p{background:var(--bg-ok)!important;border-color:var(--tx-ok)!important;color:var(--tx-ok)!important}
    .att-a{background:var(--bg-err)!important;border-color:var(--tx-err)!important;color:var(--tx-err)!important}
    .att-e{background:var(--bg-warn)!important;border-color:var(--tx-warn)!important;color:var(--tx-warn)!important}

    /* ── print ── */
    @media print{
      html,body{background:#fff;display:block}
      .app,.sidebar,.topbar,.overlay{display:none!important}
      .content{padding:0;overflow:visible}
      .rc{max-width:none;display:block!important}
      .card{border:none;padding:0}
      .paper-actions{display:none!important}
      #paper-print-area{display:block!important;padding:0}
    }
    /* ── exam paper viewer ── */
    .paper-card{background:var(--bg2);border:.5px solid var(--bd3);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
    .paper-card:hover{background:var(--bg)}
    .paper-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--burg);color:#fff}
    .paper-tag.ca1{background:#2563eb}
    .paper-tag.ca2{background:#7c3aed}
    .paper-tag.exam{background:#b91c1c}
    #paper-print-area{display:none}

    /* ════════════════════════════════════════
       RESPONSIVE — tablet & mobile
    ════════════════════════════════════════ */
    @media (max-width:800px){
      .stats-row{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width:700px){
      /* full screen on mobile */
      body{align-items:stretch;background:var(--bg);padding:0}
      .app{grid-template-columns:1fr;height:100dvh;max-width:none;border-radius:0;border:none;box-shadow:none}

      /* sidebar becomes a fixed drawer */
      .sidebar{
        position:fixed;top:0;left:0;bottom:0;
        width:230px;z-index:100;
        transform:translateX(-100%);
        transition:transform .25s ease;
        box-shadow:4px 0 20px rgba(0,0,0,.15);
        border-right:.5px solid var(--bd3);
      }
      .sidebar.open{transform:translateX(0)}

      /* show hamburger */
      .hamburger{display:flex}

      /* topbar tweaks */
      .topbar{padding:10px 12px}
      .content{padding:12px}

      /* stats 2-col */
      .stats-row{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
      .stat-val{font-size:18px}

      /* score rows: stack on mobile */
      .srow-hdr{display:none}
      .srow{flex-direction:column;align-items:stretch;padding:10px 0;gap:4px}
      .srow-name{font-size:13px;font-weight:500}
      .srow-fields{grid-template-columns:1fr 1fr 56px 48px;gap:6px}
      .mobile-field-labels{display:grid}

      /* attendance grid */
      .att-grid{grid-template-columns:1fr 1fr!important}

      /* section table: hide ID column */
      .col-id{display:none}

      /* rc info grid: single column */
      .rc-info-grid{grid-template-columns:1fr}

      /* sig row: stack */
      .sig-row{flex-direction:column;gap:16px}
      .sig-row > div > div{width:100%!important}

      /* search bar */
      .search-bar{flex-direction:column}

      /* settings grid */
      .settings-grid{grid-template-columns:1fr!important}

      /* bulk entry table: scroll */
      .entry-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
      #entry-tbl{min-width:420px}
    }

    /* ── modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
    .modal-box{background:var(--bg);border-radius:var(--rlg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal-head{padding:14px 16px;border-bottom:.5px solid var(--bd3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-body{padding:16px}
    .modal-close{background:none;border:none;cursor:pointer;font-size:22px;color:var(--tx2);line-height:1;padding:0;display:flex;align-items:center}

    /* ── admin tabs ── */
    .atabs{display:flex;gap:2px;border-bottom:.5px solid var(--bd3);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .atab{padding:8px 14px;font-size:13px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;user-select:none}
    .atab.active{color:var(--burg);border-bottom-color:var(--burg);font-weight:500}
    .atab:hover:not(.active){color:var(--tx)}

    /* ── filter bar ── */
    .filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .filter-bar select,.filter-bar input{width:auto;flex:1;min-width:120px}

    /* ── staff / status badges ── */
    .badge-teach{background:#e8f4ff;color:#1565C0}
    .badge-nonteach{background:#f3e8ff;color:#6a1b9a}
    .badge-left{background:var(--bg2);color:var(--tx3)}
    .badge-grad{background:#e8f5e9;color:#2e7d32}

    /* ── pill row (annex pills) ── */
    .annex-pill{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--tx2)}

    @media (max-width:700px){
      .modal-overlay{padding:8px;align-items:flex-end}
      .modal-box{max-height:85vh;border-radius:var(--rlg) var(--rlg) 0 0}
    }

    /* ── hub ── */
    .app.hub-mode{grid-template-columns:1fr}
    .app.hub-mode .sidebar{display:none}
    .app.hub-mode .topbar{display:none}
    .hub-page{display:flex;flex-direction:column;align-items:center;padding:32px 20px 48px;min-height:100%;background:var(--bg2)}
    .hub-brand{text-align:center;margin-bottom:8px}
    .hub-school-name{font-size:24px;font-weight:700;color:var(--burg);letter-spacing:-.3px}
    .hub-system-name{font-size:13px;color:var(--tx2);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
    .hub-status-bar{display:flex;align-items:center;gap:10px;background:var(--bg);border:.5px solid var(--bd3);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--tx2);margin:18px 0 28px}
    .hub-tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:720px}
    .hub-tile{background:var(--bg);border:.5px solid var(--bd3);border-radius:12px;padding:22px 16px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s;text-align:center;user-select:none}
    .hub-tile:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.1);border-color:var(--bd2)}
    .hub-tile:active{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.08)}
    .hub-tile-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .hub-tile-icon i{font-size:27px}
    .hub-tile-label{font-size:14px;font-weight:600;color:var(--tx)}
    .hub-tile-desc{font-size:11px;color:var(--tx2);line-height:1.55}
    .hub-tile-lock{font-size:10px;color:var(--tx3);display:flex;align-items:center;gap:3px;margin-top:1px}
    .hub-tile.tile-locked{border-color:#e8c0c8}
    .hub-tile.tile-locked:hover{border-color:var(--burg);box-shadow:0 8px 28px rgba(139,26,47,.12)}
    .hub-tile.tile-locked .hub-tile-label{color:var(--burg)}
    /* section sidebar */
    .nav-back{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;color:var(--tx2);cursor:pointer;border-bottom:.5px solid var(--bd3);transition:color .15s;user-select:none}
    .nav-back:hover{color:var(--tx)}
    .nav-back i{font-size:16px}
    .section-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;border-bottom:.5px solid var(--bd3);margin-bottom:4px}
    .section-hdr-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 5px rgba(0,0,0,.15)}
    .section-hdr-icon i{font-size:17px}
    .section-hdr-label{font-size:13px;font-weight:600;color:var(--tx)}
    @media(max-width:700px){
      .hub-tiles{grid-template-columns:repeat(2,1fr)}
      .hub-tile.tile-locked{grid-column:1/-1;max-width:280px;margin:0 auto;width:100%}
    }
    @media(max-width:400px){
      .hub-tiles{grid-template-columns:1fr}
      .hub-tile.tile-locked{max-width:none}
    }

    /* ── tile & section icon colours (respond to dark mode) ── */
    .tile-ic-academic  {background:#cfe0f5} .tile-ic-academic   i{color:#1558a0}
    .tile-ic-finance   {background:#c6e8d0} .tile-ic-finance    i{color:#1a6634}
    .tile-ic-students  {background:#fde8ac} .tile-ic-students   i{color:#a85208}
    .tile-ic-staff     {background:#e4d2f7} .tile-ic-staff      i{color:#5e1890}
    .tile-ic-principal {background:#f4ccd4} .tile-ic-principal  i{color:#8B1A2F}
    .tile-ic-entrance  {background:#cdf0ea} .tile-ic-entrance   i{color:#0d6b52}

    /* ── dark mode ── */
    [data-theme="dark"]{
      --bg:#1a1f2e; --bg2:#141827;
      --bg-ok:#0a2016; --bg-info:#0d1f3e; --bg-warn:#251c06; --bg-err:#250a12;
      --tx:#dce4f7; --tx2:#8894b2; --tx3:#566079;
      --tx-ok:#4ade80; --tx-info:#60a5fa; --tx-warn:#fbbf24; --tx-err:#f87171;
      --bd:#3a4662; --bd2:#252e47; --bd3:#1c2338;
    }

async function submitHubPin(){
  if(!dbClient){alert("Database not connected");return;}
  const pin=document.getElementById("hub-pin")?.value?.trim();
  if(!pin){alert("Enter a PIN");return;}
  const hash=await sha256(pin);
  if(storedPinHash===null){
    const pin2=document.getElementById("hub-pin2")?.value?.trim();
    if(pin!==pin2){alert("PINs do not match");return;}
    const{error}=await dbClient.from("admin_config").upsert({id:1,pin_hash:hash},{onConflict:"id"});
    if(error){alert("Error saving PIN: "+error.message);return;}
    storedPinHash=hash;
  }else if(hash!==storedPinHash){alert("Incorrect PIN");return;}
  adminUnlocked=true; _role='principal';
  closeModal();
  enterSection("principals-desk");
}

/* ── sha256 ── */
async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function loadFromSupabase() {
  if (!dbClient) return false;
  try {
    await Promise.all([loadAnnexes(), loadRoster(), loadAllStudentsDb(), loadStaff(), loadAdminPin(), loadExamPapers(), loadEdgeTests(), loadStudentProfiles(), loadGuardians(), loadFeeStructure(), loadPaymentLog(), loadExpenseLog(), loadAssets(), loadIncidentLog(), loadSchemes(), loadHolidays(), loadInventoryItems(), loadInventoryTxns(), loadFeederSchools(), loadExternalCandidates(), loadCandidateScores(), loadActivityMemberships(), loadActivitySessions(), loadActivityCompetitions(), loadSchoolEvents()]);
    const [sr, ar, or_] = await Promise.all([
      dbClient.from("scores").select("*").eq("term",currentTerm).eq("session",currentSession),
      dbClient.from("attendance").select("*").eq("term",currentTerm).eq("session",currentSession),
      dbClient.from("observations").select("*").eq("term",currentTerm).eq("session",currentSession),
    ]);
    if (sr.error||ar.error||or_.error) throw new Error("query failed");
    store = {scores:{},attendance:{},character:{},teacherComments:{},principalComments:{}};
    for (const r of sr.data) {
      if (!store.scores[r.student_id]) store.scores[r.student_id]={};
      store.scores[r.student_id][r.subject]={ca:r.ca??'',exam:r.exam??''};
    }
    for (const r of ar.data) store.attendance[r.student_id]={total:r.total_days,present:r.days_present??''};
    for (const r of or_.data) {
      store.character[r.student_id]        = r.character_note    ||'';
      store.teacherComments[r.student_id]  = r.teacher_comment   ||'';
      store.principalComments[r.student_id]= r.principal_comment ||'';
    }
    saveLocalStore(); return true;
  } catch(e) { console.error("Supabase load:",e); return false; }
}
async function upsertScore(sid, sub) {
  if (!dbClient) return;
  const key=`${sid}|${sub}`; clearTimeout(scoreTimers[key]); markSaving();
  scoreTimers[key]=setTimeout(async()=>{
    const sc=getScore(sid,sub);
    const {error}=await dbClient.from("scores").upsert({student_id:sid,subject:sub,ca:sc.ca===''?null:parseFloat(sc.ca),exam:sc.exam===''?null:parseFloat(sc.exam),term:currentTerm,session:currentSession},{onConflict:"student_id,subject,term,session"});
    if(error)console.error("score upsert:",error); markSaved();
  },700);
}
async function upsertAttendance(sid) {
  if (!dbClient) return;
  clearTimeout(attTimers[sid]); markSaving();
  attTimers[sid]=setTimeout(async()=>{
    const a=getAtt(sid);
    const {error}=await dbClient.from("attendance").upsert({student_id:sid,total_days:parseInt(a.total)||57,days_present:a.present===''?null:parseInt(a.present),term:currentTerm,session:currentSession},{onConflict:"student_id,term,session"});
    if(error)console.error("att upsert:",error); markSaved();
  },700);
}

  if (!dbClient) return;
  clearTimeout(obsTimers[sid]); markSaving();

    const {error}=await dbClient.from("observations").upsert({student_id:sid,character_note:getChar(sid),teacher_comment:getTComment(sid),principal_comment:getPComment(sid),term:currentTerm,session:currentSession},{onConflict:"student_id,term,session"});

}

/* ── local store ── */
function storeKey(){return`dbs-v2-${currentTerm.replace(/\s/g,"-")}-${currentSession.replace(/\//g,"-")}`;}
function loadLocalStore(){try{const r=localStorage.getItem(storeKey())||localStorage.getItem("dbs-records-v1");if(r)store=JSON.parse(r);}catch(e){}}
function saveLocalStore(){try{localStorage.setItem(storeKey(),JSON.stringify(store));}catch(e){}}

/* ── save indicator ── */
function markSaving(){pendingSaves++;const el=document.getElementById("save-indicator");if(el)el.textContent="Saving…";}
function markSaved(){pendingSaves=Math.max(0,pendingSaves-1);if(pendingSaves===0){const el=document.getElementById("save-indicator");if(el){el.textContent="Saved ✓";setTimeout(()=>{if(el)el.textContent=""},2500);}}}

/* ── db indicator ── */
function updateDbIndicator(){
  const dot=document.getElementById("db-dot"),lbl=document.getElementById("db-lbl");
  if(!dot||!lbl)return;
  dot.className="db-dot "+({connected:"dot-ok",error:"dot-err",loading:"dot-spin",offline:"dot-off"}[dbStatus]||"dot-off");
  lbl.textContent={connected:"Supabase connected",error:"Connection error",loading:"Connecting…",offline:"Local only"}[dbStatus]||"Local only";
}
function updateTermDisplay(){const el=document.getElementById("term-display");if(el)el.textContent=`${currentTerm} · ${currentSession}`;}

/* ── getters / setters ── */
function getScore(sid,sub){return(store.scores[sid]||{})[sub]||{ca:'',exam:''};}
function setScore(sid,sub,field,val){if(!store.scores[sid])store.scores[sid]={};if(!store.scores[sid][sub])store.scores[sid][sub]={ca:'',exam:''};store.scores[sid][sub][field]=val;saveLocalStore();upsertScore(sid,sub);}
function getAtt(sid){return store.attendance[sid]||{total:57,present:''};}
function setAtt(sid,field,val){if(!store.attendance[sid])store.attendance[sid]={total:57,present:''};store.attendance[sid][field]=val;saveLocalStore();upsertAttendance(sid);}
function getChar(sid){return store.character[sid]||'';}
function setChar(sid,val){store.character[sid]=val;saveLocalStore();upsertObservation(sid);}
function getTComment(sid){return store.teacherComments[sid]||'';}
function setTComment(sid,val){store.teacherComments[sid]=val;saveLocalStore();upsertObservation(sid);}
function getPComment(sid){return store.principalComments[sid]||'';}
function setPComment(sid,val){store.principalComments[sid]=val;saveLocalStore();upsertObservation(sid);}

/* ── grade helpers ── */
function total(sid,sub){const s=getScore(sid,sub);const c=parseFloat(s.ca)||0,e=parseFloat(s.exam)||0;if(!s.ca&&!s.exam)return null;return c+e;}
function grade(t){if(t===null)return"-";return t>=70?"A":t>=60?"B":t>=50?"C":t>=45?"D":"F";}
function gradeBadge(g){if(g==="-")return`<span style="color:var(--tx3)">—</span>`;return`<span class="badge badge-${g.toLowerCase()}">${g}</span>`;}
function remark(g){return{A:"Excellent",B:"Good",C:"Satisfactory",D:"Needs Improvement",F:"Fail"}[g]||"";}

/* ── utils ── */
function initials(n){return n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function avatarColor(n){return["#8B1A2F","#185FA5","#0F6E56","#B57A1A","#534AB7"][n.charCodeAt(0)%5];}
function sectionForClass(cls){for(const[s,a]of Object.entries(CLASSES))if(a.includes(cls))return s;return null;}
function avatar(name,size=28){return`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${avatarColor(name)};display:flex;align-items:center;justify-content:center;color:#fff;font-size:${Math.floor(size*.36)}px;font-weight:600;flex-shrink:0">${initials(name)}</div>`;}

/* ── navigation ── */
function nav(page,arg,el){
  _curPage=page; _curArg=arg;
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  if(el?.classList)el.classList.add("active");
  closeSidebar();
  if(page==="dashboard")renderDashboard();
  else if(page==="class")renderSection(arg);
  else if(page==="entry")renderScoreEntry();
  else if(page==="search")renderSearch();
  else if(page==="staff")renderStaffDirectory();
  else if(page==="papers")renderExamPapers();
  else if(page==="edge")renderEdgeTests();
  else if(page==="settings")renderSettings();
  else if(page==="admin")renderAdmin();
  else if(page==="finance-dashboard")renderFinanceDashboard();
  else if(page==="attendance")openAttendance();
  else if(page==="finance-log")renderFinanceLog();
  else if(page==="finance-expenses")renderExpenses();
  else if(page==="finance-ledger")renderFinanceLedger();
  else if(page==="assets")renderAssets();
  else if(page==="incidents")renderIncidentLog();
  else if(page==="stock")renderInventory();
  else if(page==="candidates")renderCandidates();
  else if(page==="entrance-scores")renderEntranceScores();
  else if(page==="feeder-schools")renderFeederSchools();
  else if(page==="email-results")renderEmailResults();
  else if(page==="report-cards")renderReportCardsView();
  else if(page==="att-register")openAttendance();
  else if(page==="att-summary")renderAttendanceSummary();
  else if(page==="act-overview")renderActivitiesOverview();
  else if(page==="act-members")renderActivityMemberships();
  else if(page==="act-sessions")renderActivitySessions();
  else if(page==="act-competitions")renderActivityCompetitions();
  else if(page==="cal-events")renderCalendar();
}
function setAnnexFilter(val){
  currentAnnexFilter=val;
  if(_curPage==="class")renderSection(_curArg);
  else if(_curPage==="entry")renderScoreEntry();
  else if(_curPage==="staff")renderStaffDirectory();
  else if(_curPage==="papers")renderExamPapers();
  else if(_curPage==="edge")renderEdgeTests();
  else if(_curPage==="admin")renderAdmin();
  else if(_curPage==="finance-ledger")renderFinanceLedger();
}
function navToSection(sec){
  const items=[...document.querySelectorAll(".nav-item")];
  const idx={"Pre-Primary":1,"Primary":2,"Junior Secondary":3,"Senior Secondary":4}[sec];
  items.forEach(n=>n.classList.remove("active"));
  if(idx!==undefined)items[idx]?.classList.add("active");
  closeSidebar();
  renderSection(sec);
}

/* ── section list ── */
function renderSection(sec){
  _curPage="class"; _curArg=sec;
  document.getElementById("page-title").textContent=sec;
  const base=roster.filter(s=>s.sec===sec&&(!currentAnnexFilter||String(s.annex_id)===String(currentAnnexFilter)));
  const students=base.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById("page-meta").textContent=`${students.length} students · ${SUBJECTS[sec].length} subjects`;
  document.getElementById("topbar-actions").innerHTML="";
  const annexOpts=dbClient?`<select onchange="setAnnexFilter(this.value)" style="width:auto">
    <option value="">All annexes</option>
    ${annexList.map(a=>`<option value="${a.id}" ${String(currentAnnexFilter)===String(a.id)?"selected":""}>${a.name}</option>`).join("")}
  </select>`:"";
  document.getElementById("content").innerHTML=`
    <div class="search-bar">
      <input id="sec-search" placeholder="Filter by name…" oninput="filterTable(this.value)" />
      <select id="cls-filter" onchange="filterTable(document.getElementById('sec-search').value)">
        <option value="">All classes</option>
        ${CLASSES[sec].map(c=>`<option>${c}</option>`).join("")}
      </select>
      ${annexOpts}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table id="student-table">
        <thead><tr><th>Name</th><th>Class</th><th class="col-id">ID</th><th>Scores</th><th></th></tr></thead>
        <tbody>${students.map(s=>{
          const subjs=SUBJECTS[sec];
          const entered=subjs.filter(sub=>{const sc=getScore(s.id,sub);return sc.ca||sc.exam;}).length;
          const pct=Math.round(entered/subjs.length*100);
          return`<tr class="trow-click" data-name="${s.name.toLowerCase()}" data-cls="${s.cls}" onclick="openStudent(${s.id})">
            <td><div style="display:flex;align-items:center;gap:8px">${avatar(s.name)}${s.name}</div></td>
            <td>${s.cls}</td>
            <td class="col-id" style="color:var(--tx2)">${s.id}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div style="flex:1;height:4px;background:var(--bd3);border-radius:2px;max-width:80px">
                  <div style="width:${pct}%;height:4px;background:var(--burg);border-radius:2px"></div>
                </div>
                <span style="font-size:11px;color:var(--tx2)">${entered}/${subjs.length}</span>
              </div>
            </td>
            <td><button class="btn btn-sm" onclick="event.stopPropagation();openStudent(${s.id})">Open</button></td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>`;
}
function filterTable(q){
  const cls=document.getElementById("cls-filter")?.value||"";
  document.querySelectorAll("#student-table tbody tr").forEach(r=>{
    const show=(r.dataset.name||"").includes(q.toLowerCase())&&(!cls||r.dataset.cls===cls);
    r.style.display=show?"":"none";
  });
}

/* ── student detail ── */

  if(!s.sec)s.sec=CLASS_SECTION[s.cls]||"Pre-Primary";

    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="navToSection('${s.sec}')"><i class="ti ti-arrow-left"></i></button>
      <button class="btn btn-sm btn-primary" onclick="showReportCard(${sid})"><i class="ti ti-file-text"></i> Report Card</button>
    </div>`;
  const att=getAtt(sid);
  document.getElementById("content").innerHTML=`
    <div class="card">
      <div class="card-head">
        <span class="card-title">Scores · ${currentTerm}</span>
        <span style="font-size:11px;color:var(--tx2)">CA /40 · Exam /60</span>
      </div>
      <div class="srow-hdr">
        <span class="srow-hdr-name">Subject</span>
        <div class="srow-hdr-fields">
          <span>CA /40</span><span>Exam /60</span><span>Total</span><span>Grade</span>
        </div>
      </div>
      ${subjs.map(sub=>{
        const sc=getScore(sid,sub),t=total(sid,sub),g=grade(t),k=sub.replace(/\W/g,"_");
        return`<div class="srow">
          <div class="srow-name">${sub}</div>
          <div class="mobile-field-labels"><span>CA /40</span><span>Exam /60</span><span>Total</span><span>Grade</span></div>
          <div class="srow-fields">
            <input class="score-input" type="number" min="0" max="40" placeholder="—" value="${sc.ca}"
              oninput="setScore(${sid},'${sub}','ca',this.value);updateDetailRow(${sid},'${sub}')" />
            <input class="score-input" type="number" min="0" max="60" placeholder="—" value="${sc.exam}"
              oninput="setScore(${sid},'${sub}','exam',this.value);updateDetailRow(${sid},'${sub}')" />
            <span id="dt-${sid}-${k}" style="text-align:center;font-weight:600">${t!==null?t:"—"}</span>
            <span id="dg-${sid}-${k}" style="text-align:center">${gradeBadge(g)}</span>
          </div>
        </div>`;
      }).join("")}
    </div>

        <div class="field"><label>Days present</label>
          <input type="number" placeholder="Enter…" value="${att.present}" oninput="setAtt(${sid},'present',this.value);updateAttPct(${sid})" /></div>
        <div class="field"><label>Attendance %</label>
          <input type="text" readonly id="att-pct-${sid}" value="${att.present?Math.round(att.present/att.total*100)+'%':'—'}" /></div>

      <div class="card-head"><span class="card-title" style="color:#8A6F30"><i class="ti ti-star"></i> EDGE Character Observation</span></div>

function updateDetailRow(sid,sub){
  const k=sub.replace(/\W/g,"_"),t=total(sid,sub),g=grade(t);
  const te=document.getElementById(`dt-${sid}-${k}`),ge=document.getElementById(`dg-${sid}-${k}`);
  if(te)te.textContent=t!==null?t:"—"; if(ge)ge.innerHTML=gradeBadge(g);
}
function updateAttPct(sid){
  const a=getAtt(sid),el=document.getElementById(`att-pct-${sid}`);
  if(el)el.value=a.present?Math.round(parseInt(a.present)/parseInt(a.total)*100)+"%":"—";
}

      <option value="">All annexes</option>

  document.getElementById("content").innerHTML=`

          <select id="entry-cls" onchange="onEntryClassChange(this.value)">

function onEntryClassChange(cls){

function onEntrySubjectChange(sub){

function buildEntryTable(cls,sub){
  const base=roster.filter(s=>s.cls===cls&&(!currentAnnexFilter||String(s.annex_id)===String(currentAnnexFilter)));

function updateEntryRow(sid,sub){

  document.getElementById("content").innerHTML=`

function switchAdminTab(tab){ _adminTab=tab; _adminClassFilter=""; renderAdmin(); }
function lockAdmin(){ adminUnlocked=false; navToHub(); }

async function submitAdminPin(){
  const pin=document.getElementById("admin-pin")?.value?.trim();
  if(!pin){alert("Enter a PIN");return;}
  const hash=await sha256(pin);
  if(storedPinHash===null){
    const pin2=document.getElementById("admin-pin2")?.value?.trim();
    if(pin!==pin2){alert("PINs do not match");return;}
    const {error}=await dbClient.from("admin_config").upsert({id:1,pin_hash:hash},{onConflict:"id"});
    if(error){alert("Error saving PIN: "+error.message);return;}
    storedPinHash=hash;
  }else if(hash!==storedPinHash){alert("Incorrect PIN");return;}
  adminUnlocked=true; _role='principal'; renderAdmin();
}

async function submitAddStudent(){
  const name=document.getElementById("m-name")?.value?.trim();
  const gender=document.getElementById("m-gender")?.value;
  const cls=document.getElementById("m-cls")?.value;
  const annexId=parseInt(document.getElementById("m-annex")?.value);
  if(!name){alert("Enter student name");return;}
  const {data:maxData}=await dbClient.from("students").select("id").gte("id",2001).order("id",{ascending:false}).limit(1);
  const newId=maxData?.length?maxData[0].id+1:2001;
  const sec=CLASS_SECTION[cls]||"Primary";
  await dbClient.from("students").insert({id:newId,name,gender,annex_id:annexId});
  await dbClient.from("enrollments").insert({student_id:newId,cls,sec,annex_id:annexId,status:"active",term:currentTerm,session:currentSession});
  closeModal();
  await loadRoster(); await loadAllStudentsDb();
  renderAdmin();
}

/* ── admin: new term init ── */
async function runInitNewTerm(){
  const srcTerm=document.getElementById("src-term")?.value;
  const srcSession=document.getElementById("src-session")?.value?.trim();
  const promote=document.getElementById("do-promote")?.checked;
  if(!srcTerm||!srcSession){alert("Select source term and enter session");return;}
  if(!confirm(`Copy enrollments from ${srcTerm} ${srcSession} → ${currentTerm} ${currentSession}?`))return;
  const {data:srcEnr}=await dbClient.from("enrollments").select("student_id,cls,sec,annex_id").eq("term",srcTerm).eq("session",srcSession).eq("status","active");
  if(srcEnr?.length){
    const newEnr=srcEnr.map(e=>{
      let cls=e.cls,sec=e.sec;
      if(promote){
        const next=PROMOTIONS[cls];
        if(next===null)return null;
        if(next){cls=next;sec=CLASS_SECTION[next]||sec;}
      }
      return{student_id:e.student_id,cls,sec,annex_id:e.annex_id,status:"active",term:currentTerm,session:currentSession};
    }).filter(Boolean);
    if(newEnr.length)await dbClient.from("enrollments").upsert(newEnr,{onConflict:"student_id,term,session"});
  }
  const {data:srcStf}=await dbClient.from("staff_assignments").select("staff_id,annex_id").eq("term",srcTerm).eq("session",srcSession).eq("status","active");
  if(srcStf?.length){
    const newStf=srcStf.map(s=>({staff_id:s.staff_id,annex_id:s.annex_id,term:currentTerm,session:currentSession,status:"active"}));
    await dbClient.from("staff_assignments").upsert(newStf,{onConflict:"staff_id,term,session"});
  }
  await loadRoster(); await loadStaff(); renderAdmin();
  alert(`Done! ${srcEnr?.length||0} student enrollments and ${srcStf?.length||0} staff copied.`);
}

async function runChangePin(){

  const confirmPin=document.getElementById("sec-confirm-pin")?.value?.trim();
  if(!oldPin||!newPin||!confirmPin){alert("Fill all fields");return;}

}

function renderExamPapersList(){

async function generateExamPaper(){
  const cls=document.getElementById("gen-cls")?.value;
  const subject=document.getElementById("gen-sub")?.value;
  const paperType=document.getElementById("gen-type")?.value;
  const status=document.getElementById("gen-status");
  if(!cls||!subject||!paperType){alert("Select class, subject, and paper type");return;}
  if(status)status.innerHTML=`<i class="ti ti-loader"></i> Generating ${subject} ${paperType} for ${cls}… this may take 15–30 seconds.`;
  try{
    const scheme=schemesStore.find(s=>s.subject===subject&&s.cls===cls&&s.term===currentTerm&&s.session===currentSession);
    const res=await fetch("/api/generate-exam",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({subject,cls,paperType,term:currentTerm,session:currentSession,schemeText:scheme?.content||null}),
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({error:res.statusText}));
      throw new Error(err.error||res.statusText);
    }
    const {content}=await res.json();
    if(!content)throw new Error("Empty response from AI");
    const sec=CLASS_SECTION[cls]||"Junior Secondary";
    const {error}=await dbClient.from("exam_papers").upsert(
      {subject,cls,sec,paper_type:paperType,term:currentTerm,session:currentSession,content},
      {onConflict:"subject,cls,paper_type,term,session"}
    );
    if(error)throw new Error("DB save failed: "+error.message);
    await loadExamPapers();
    renderAdminTab();
    if(status)status.innerHTML=`<span style="color:var(--tx-ok)"><i class="ti ti-check"></i> Done! Paper saved.</span>`;
  }catch(e){
    console.error("generate-exam:",e);
    if(status)status.innerHTML=`<span style="color:var(--tx-err)"><i class="ti ti-alert-circle"></i> Error: ${e.message}</span>`;
  }
}

/* ── finance helpers ── */
function classGroupFor(cls){
  if(["Nursery 1","Nursery 2","KG 1","KG 2"].includes(cls)) return "Pre-Primary";
  if(["Basic 1","Basic 2","Basic 3","Basic 4","Basic 5"].includes(cls)) return "Primary";
  if(["JSS 1","JSS 2","JSS 3"].includes(cls)) return "JSS";
  if(["SS 1","SS 2","SS 3"].includes(cls)) return "SS";
  return "Primary";
}

function feeOwedFor(cls){
  const grp=classGroupFor(cls);
  return feeStructure
    .filter(f=>(f.class_group===grp||f.class_group==='All')&&!f.is_optional)
    .reduce((s,f)=>s+parseFloat(f.amount||0),0);
}

function amountPaidFor(sid){
  return paymentLog.filter(p=>p.student_id===sid)
    .reduce((s,p)=>s+parseFloat(p.amount||0),0);
}

let _logStudentId = null;
function filterLogStudents(val){
  const s=roster.find(x=>x.name.toLowerCase()===val.toLowerCase());
  if(s){ _logStudentId=s.id; document.getElementById("log-student-id").textContent=`ID: ${s.id} · ${s.cls}`; }
  else { _logStudentId=null; document.getElementById("log-student-id").textContent=""; }
}

async function submitPaymentLog(){
  const studentName=document.getElementById("log-student")?.value?.trim();
  const amount=parseFloat(document.getElementById("log-amount")?.value);
  const feeName=document.getElementById("log-fee")?.value;
  const method=document.getElementById("log-method")?.value;
  const receipt=document.getElementById("log-receipt")?.value?.trim();
  const date=document.getElementById("log-date")?.value;
  const note=document.getElementById("log-note")?.value?.trim();
  const statusEl=document.getElementById("log-status");

  if(!studentName){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Enter student name</span>`;return;}
  if(!amount||amount<=0){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Enter a valid amount</span>`;return;}
  if(!date){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Select a date</span>`;return;}

  const {error}=await dbClient.from("payment_log").insert({
    student_id:_logStudentId||null,
    student_name:studentName,
    amount,
    fee_name:feeName||null,
    payment_method:method,
    receipt_number:receipt||null,
    note:note||null,
    term:currentTerm,
    session:currentSession,
    payment_date:date,
  });
  if(error){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Error: ${error.message}</span>`;return;}

  await loadPaymentLog();
  if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-ok)"><i class="ti ti-check"></i> Payment recorded!</span>`;
  // clear form
  document.getElementById("log-student").value="";
  document.getElementById("log-amount").value="";
  document.getElementById("log-receipt").value="";
  document.getElementById("log-note").value="";
  _logStudentId=null;
  // refresh today list
  renderFinanceLog();
}

async function deletePaymentEntry(id){
  if(!confirm("Delete this payment entry?"))return;
  await dbClient.from("payment_log").delete().eq("id",id);
  await loadPaymentLog();
  renderFinanceLog();
}

/* ── finance: ledger ── */
let _ledgerFilter="";
function renderFinanceLedger(){
  document.getElementById("page-title").textContent="Payment Ledger";
  document.getElementById("page-meta").textContent=`${currentTerm} · ${currentSession}`;
  document.getElementById("topbar-actions").innerHTML="";
  if(!canDo('principal')){
    document.getElementById("content").innerHTML=`<div class="card" style="max-width:420px">
      <div class="card-head"><span class="card-title"><i class="ti ti-lock"></i> Principal access required</span></div>
      <p style="font-size:13px;color:var(--tx2)">The full payment ledger is only visible to the principal.</p>
    </div>`;
    return;
  }

  const annexOpts=`<select onchange="setAnnexFilter(this.value)" style="min-width:120px">
    <option value="">All annexes</option>
    ${annexList.map(a=>`<option value="${a.id}" ${String(currentAnnexFilter)===String(a.id)?"selected":""}>${a.name}</option>`).join("")}
  </select>`;
  const statusOpts=`<select onchange="_ledgerFilter=this.value;renderFinanceLedger()" style="min-width:120px">
    <option value="">All students</option>
    <option value="paid" ${_ledgerFilter==="paid"?"selected":""}>Fully paid</option>
    <option value="partial" ${_ledgerFilter==="partial"?"selected":""}>Partial</option>
    <option value="unpaid" ${_ledgerFilter==="unpaid"?"selected":""}>No payment</option>
  </select>`;

  let students=roster.filter(s=>!currentAnnexFilter||String(s.annex_id)===String(currentAnnexFilter));
  students=students.map(s=>{
    const owed=feeOwedFor(s.cls);
    const paid=amountPaidFor(s.id);
    const balance=owed-paid;
    const status=paid>=owed&&owed>0?"paid":paid>0?"partial":"unpaid";
    return{...s,owed,paid,balance,status};
  });
  if(_ledgerFilter)students=students.filter(s=>s.status===_ledgerFilter);
  students.sort((a,b)=>a.name.localeCompare(b.name));

  const rows=students.map(s=>{
    const statusColor=s.status==="paid"?"var(--tx-ok)":s.status==="partial"?"var(--tx-warn)":"var(--tx-err)";
    const statusLabel=s.status==="paid"?"Paid":s.status==="partial"?"Partial":"Unpaid";
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${avatar(s.name)}${s.name}</div></td>
      <td>${s.cls}</td>
      <td>₦${s.owed.toLocaleString()}</td>
      <td style="color:var(--tx-ok)">₦${s.paid.toLocaleString()}</td>
      <td style="color:${s.balance>0?"var(--tx-err)":"var(--tx-ok)"};font-weight:600">₦${Math.abs(s.balance).toLocaleString()}${s.balance<0?" (overpaid)":""}</td>
      <td><span style="font-size:11px;font-weight:600;color:${statusColor}">${statusLabel}</span></td>
    </tr>`;
  }).join("");

  document.getElementById("content").innerHTML=`
    <div class="filter-bar">${annexOpts}${statusOpts}</div>
    ${students.length?`<div class="card"><div style="overflow-x:auto"><table>
      <thead><tr><th>Name</th><th>Class</th><th>Owed</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`
    :`<div class="card"><div class="empty"><i class="ti ti-table-off"></i>No students match</div></div>`}`;
}

                <td style="font-weight:600">₦${parseFloat(e.amount).toLocaleString()}</td>

        <span style="font-size:13px;font-weight:600;color:var(--tx-err)">Total: ₦${totalExp.toLocaleString()}</span>

      ${expenseLog.length
        ?`<table>
            <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th>Ref</th><th></th></tr></thead>

            </tr>`).join("")}</tbody>

        :`<div class="empty"><i class="ti ti-cash-banknote"></i>No expenses recorded for this term</div>`}
    </div>`;
}
async function submitAddExpense(){
  const desc=document.getElementById("exp-desc")?.value?.trim();
  const cat=document.getElementById("exp-cat")?.value;
  const amount=parseFloat(document.getElementById("exp-amount")?.value);
  const date=document.getElementById("exp-date")?.value;
  const ref=document.getElementById("exp-ref")?.value?.trim()||null;
  const st=document.getElementById("exp-status");
  if(!desc){if(st)st.innerHTML=`<span style="color:var(--tx-err)">Enter a description</span>`;return;}

  if(error){if(st)st.innerHTML=`<span style="color:var(--tx-err)">Error: ${error.message}</span>`;return;}
  await loadExpenseLog(); renderExpenses();

async function deleteExpense(id){
  if(!confirm("Delete this expense entry?"))return;
  await dbClient.from("expense_log").delete().eq("id",id);

}

/* ── admin: fee setup tab ── */
function buildAdminFeeHtml(){
  const groups=["Pre-Primary","Primary","JSS","SS"];
  const byGroup={};
  feeStructure.forEach(f=>{if(!byGroup[f.class_group])byGroup[f.class_group]=[];byGroup[f.class_group].push(f);});

  const schoolWide=byGroup['All']||[];
  const schoolWideMandatory=schoolWide.filter(f=>!f.is_optional).reduce((s,f)=>s+parseFloat(f.amount||0),0);

  function feeTable(items){
    return`<table><thead><tr><th>Fee</th><th>Amount</th><th>Type</th><th></th></tr></thead>
      <tbody>${items.map(f=>`<tr>
        <td>${f.fee_name}</td>
        <td>₦${parseFloat(f.amount).toLocaleString()}</td>
        <td><span style="font-size:11px;color:var(--tx3)">${f.is_optional?"Optional":"Mandatory"}</span></td>
        <td><button class="btn btn-sm" style="color:var(--tx-err)" onclick="deleteFeeItem(${f.id},'${f.fee_name}')"><i class="ti ti-trash"></i></button></td>
      </tr>`).join("")}</tbody></table>`;
  }

  const scopeOpts=[
    {val:'All',         label:'All classes (school-wide)'},
    {val:'Pre-Primary', label:'Pre-Primary only'},
    {val:'Primary',     label:'Primary only'},
    {val:'JSS',         label:'JSS only'},
    {val:'SS',          label:'SS only'},
  ];

  return`<div class="card">
    <div class="card-head">
      <span class="card-title">Add Fee Item</span>
      <span style="font-size:11px;color:var(--tx3)">${currentTerm} · ${currentSession}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end">
      <div class="field" style="margin:0"><label>Applies to</label>
        <select id="fee-group">${scopeOpts.map(o=>`<option value="${o.val}">${o.label}</option>`).join("")}</select></div>
      <div class="field" style="margin:0"><label>Fee name</label>
        <input id="fee-name" placeholder="e.g. Tuition, PTA Levy" /></div>
      <div class="field" style="margin:0"><label>Amount (₦)</label>
        <input type="number" id="fee-amount" min="0" placeholder="0" /></div>
      <button class="btn btn-primary" style="height:38px;margin-bottom:0" onclick="submitAddFee()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
      <input type="checkbox" id="fee-optional" style="width:auto" />
      <label for="fee-optional" style="margin:0;font-size:13px;cursor:pointer">Optional / extra item (uniform, books, excursion etc.)</label>
    </div>
    <div id="fee-status" style="margin-top:8px;font-size:12px"></div>
  </div>

  <div class="card" style="margin-top:10px;border-color:var(--navy)">
    <div class="card-head">
      <span class="card-title"><i class="ti ti-building-school" style="color:var(--navy)"></i> All Classes — School-wide</span>
      ${schoolWide.length?`<span style="font-size:12px;color:var(--tx2)">Mandatory: <strong>₦${schoolWideMandatory.toLocaleString()}</strong></span>`:""}
    </div>
    <p style="font-size:11px;color:var(--tx3);margin-bottom:${schoolWide.length?10:0}px">These fees apply to every student in the school regardless of class.</p>
    ${schoolWide.length?feeTable(schoolWide):`<div class="empty" style="padding:10px 0">No school-wide fees set</div>`}
  </div>

  ${groups.map(g=>{
    const items=byGroup[g]||[];
    const grpMandatory=items.filter(f=>!f.is_optional).reduce((s,f)=>s+parseFloat(f.amount||0),0);
    const studentTotal=grpMandatory+schoolWideMandatory;
    const breakdown=schoolWideMandatory>0
      ?`<span style="font-size:11px;font-weight:400;color:var(--tx3)"> = ₦${grpMandatory.toLocaleString()} class + ₦${schoolWideMandatory.toLocaleString()} school-wide</span>`
      :"";
    return`<div class="card" style="margin-top:10px">
      <div class="card-head">
        <span class="card-title">${g}</span>
        <span style="font-size:12px;color:var(--tx2)">Student total: <strong>₦${studentTotal.toLocaleString()}</strong>${breakdown}</span>
      </div>
      ${items.length?feeTable(items):`<div class="empty" style="padding:10px 0">No class-specific fees — only school-wide fees apply</div>`}
    </div>`;
  }).join("")}`;
}

async function submitAddFee(){
  const classGroup=document.getElementById("fee-group")?.value;
  const feeName=document.getElementById("fee-name")?.value?.trim();
  const amount=parseFloat(document.getElementById("fee-amount")?.value);
  const isOptional=document.getElementById("fee-optional")?.checked;
  const statusEl=document.getElementById("fee-status");
  if(!feeName){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Enter a fee name</span>`;return;}
  if(!amount||amount<=0){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Enter a valid amount</span>`;return;}
  const {error}=await dbClient.from("fee_structure").upsert(
    {class_group:classGroup,fee_name:feeName,amount,is_optional:isOptional,term:currentTerm,session:currentSession},
    {onConflict:"class_group,fee_name,term,session"}
  );
  if(error){if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Error: ${error.message}</span>`;return;}
  await loadFeeStructure();
  renderAdminTab();
}

async function deleteFeeItem(id,name){
  if(!confirm(`Delete "${name}" fee item?`))return;
  await dbClient.from("fee_structure").delete().eq("id",id);
  await loadFeeStructure(); renderAdminTab();
}

function renderSettings(){

  document.getElementById("topbar-actions").innerHTML="";
  const connBadge={connected:`<span class="badge badge-ok">Connected</span>`,error:`<span class="badge badge-err">Connection error</span>`,loading:`<span class="badge badge-neutral">Connecting…</span>`,offline:`<span class="badge badge-neutral">Offline</span>`}[dbStatus];
  document.getElementById("content").innerHTML=`
    <div class="card">
      <div class="card-head"><span class="card-title">Database</span>${connBadge}</div>

async function saveAdminPin(){
  const pin=document.getElementById("set-admin-pin")?.value?.trim();
  const pin2=document.getElementById("set-admin-pin2")?.value?.trim();
  const st=document.getElementById("admin-pin-status");
  if(!pin){if(st)st.innerHTML=`<span style="color:var(--tx-err)">Enter a PIN</span>`;return;}
  if(pin!==pin2){if(st)st.innerHTML=`<span style="color:var(--tx-err)">PINs do not match</span>`;return;}
  const hash=await sha256(pin);
  const{error}=await dbClient.from("admin_config").update({admin_pin_hash:hash}).eq("id",1);
  if(error){if(st)st.innerHTML=`<span style="color:var(--tx-err)">Error: ${error.message}</span>`;return;}
  storedAdminPinHash=hash;
  if(st)st.innerHTML=`<span style="color:var(--tx-ok)"><i class="ti ti-check"></i> Admin PIN saved</span>`;

function renderEdgeTestsList(){

function refreshEdgeSubjects(){

  sel.innerHTML=subs.map(s=>`<option>${s}</option>`).join("");
}

async function generateEdgeTest(testType){
  const statusId=testType==="weekly"?"edge-weekly-status":"edge-mock-status";
  const status=document.getElementById(statusId);
  let cls,half,weekNumber,subject,mockNumber;
  if(testType==="weekly"){
    cls=document.getElementById("edge-weekly-cls")?.value;
    weekNumber=parseInt(document.getElementById("edge-weekly-week")?.value||"3");
    half=((weekNumber-3)%2===0)?"A":"B";
    if(!cls){alert("Select a class");return;}
  } else {
    cls=document.getElementById("edge-mock-cls")?.value;
    subject=document.getElementById("edge-mock-sub")?.value;
    mockNumber=parseInt(document.getElementById("edge-mock-num")?.value||"1");
    if(!cls||!subject){alert("Select class and subject");return;}
  }
  const label=testType==="weekly"?`${cls} Week ${weekNumber} Half ${half}`:
    `${cls} ${subject} Mock ${mockNumber}`;
  if(status)status.innerHTML=`<i class="ti ti-loader"></i> Generating ${label}… this may take 20–40 seconds.`;
  try{
    const body={testType,cls,term:currentTerm,session:currentSession};
    if(testType==="weekly"){body.half=half;body.weekNumber=weekNumber;}
    else{body.subject=subject;body.mockNumber=mockNumber;}
    const res=await fetch("/api/generate-edge",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body),
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({error:res.statusText}));
      throw new Error(err.error||res.statusText);
    }
    const {content}=await res.json();
    if(!content)throw new Error("Empty response from AI");
    const row={test_type:testType,cls,term:currentTerm,session:currentSession,content};
    if(testType==="weekly"){row.half=half;row.week_number=weekNumber;}
    else{row.subject=subject;row.mock_number=mockNumber;}
    const {error:dbErr}=await dbClient.from("edge_tests").insert(row);
    if(dbErr)throw new Error("DB save failed: "+dbErr.message);
    await loadEdgeTests();
    renderAdminTab();
    if(status)status.innerHTML=`<span style="color:var(--tx-ok)"><i class="ti ti-check"></i> Done! Test saved.</span>`;
  }catch(e){
    console.error("generate-edge:",e);
    if(status)status.innerHTML=`<span style="color:var(--tx-err)"><i class="ti ti-alert-circle"></i> Error: ${e.message}</span>`;
  }
}

    .select("school_date,student_id,status")

async function handleSchemeFile(input){
  const file=input.files[0]; if(!file)return;
  const statusEl=document.getElementById("sch-status");
  if(statusEl)statusEl.textContent="Extracting text…";
  if(file.name.endsWith(".txt")){
    const text=await file.text();
    const ta=document.getElementById("sch-text"); if(ta)ta.value=text;
    if(statusEl)statusEl.textContent="";
    return;
  }
  if(typeof mammoth==="undefined"){
    if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">mammoth.js not loaded — paste text manually</span>`;
    return;
  }
  try{
    const buf=await file.arrayBuffer();
    const res=await mammoth.extractRawText({arrayBuffer:buf});
    const ta=document.getElementById("sch-text"); if(ta)ta.value=res.value;
    if(statusEl)statusEl.textContent="";
  }catch(e){
    if(statusEl)statusEl.innerHTML=`<span style="color:var(--tx-err)">Could not read file: ${e.message}</span>`;
  }
}

/* ── Word document download ── */
async function downloadAsWord(content, filename){
  if(!content){alert("No content to download");return;}
  const safeName=filename.replace(/[^a-z0-9 ._-]/gi,'_').trim();
  if(typeof HTMLtoDOCX==='function'){
    try{
      const blob=await HTMLtoDOCX(content,null,{
        title:filename,
        font:'Arial',
        fontSize:24,
        margins:{top:1440,right:1440,bottom:1440,left:1440}
      });
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=safeName+'.docx';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      return;
    }catch(e){console.warn('html-to-docx failed, using fallback:',e);}
  }
  // Fallback: legacy .doc format
  const preHtml=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>${filename}</title><style>body{font-family:Arial,sans-serif;font-size:12pt;margin:2cm;line-height:1.6}h2,h3{color:#8B1A2F;text-align:center}h4{color:#185FA5;margin-top:14px}ol{margin-left:20px}li{margin-bottom:5px}hr{border:1px solid #ccc;margin:14px 0}</style></head><body>`;
  const postHtml=`</body></html>`;
  const blob=new Blob(['﻿',preHtml+content+postHtml],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=safeName+'.doc';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

function candidateTotalScore(cid){
  const s=candidateScoresMap[cid]||{};
  return ENTRANCE_SUBJECTS.reduce((t,sub)=>t+(parseFloat(s[sub]?.score)||0),0);
}
function candidateMaxScore(){ return ENTRANCE_SUBJECTS.length*100; }
function entranceGrade(total,max){
  const p=max>0?total/max*100:0;
  if(p>=80)return'A';if(p>=70)return'B';if(p>=60)return'C';if(p>=50)return'Pass';return'Fail';
}
function gradeColor(g){ return{A:'var(--tx-ok)',B:'var(--tx-ok)',C:'var(--tx-info)',Pass:'var(--tx-warn)',Fail:'var(--tx-err)'}[g]||'var(--tx)'; }
function hasScores(cid){ return ENTRANCE_SUBJECTS.some(s=>candidateScoresMap[cid]?.[s]?.score!=null); }

const CAND_STATUS_LABELS={wrote:'Wrote Exam',admitted:'Admitted',enrolled:'Enrolled',declined:'Declined'};
const CAND_STATUS_COLORS={wrote:'var(--tx-info)',admitted:'var(--tx-ok)',enrolled:'#0d6b52',declined:'var(--tx3)'};

async function submitEditCandidate(id){

async function deleteCandidate(id,name){
  if(!canDo('principal')){alert("Principal access required");return;}
  if(!confirm(`Delete "${name}" and all their scores?`))return;
  await dbClient.from("external_candidates").delete().eq("id",id);
  await Promise.all([loadExternalCandidates(),loadCandidateScores()]); renderCandidates();
}

function renderEntranceScores(){
  document.getElementById("page-title").textContent="Enter Scores";
  document.getElementById("page-meta").textContent="Entrance exam scores";
  document.getElementById("topbar-actions").innerHTML="";

  const sessions=[...new Set(externalCandidates.map(c=>c.exam_session))].sort().reverse();
  const selSession=_candScoreTarget?
    (externalCandidates.find(c=>c.id===_candScoreTarget)?.exam_session||sessions[0]||currentSession)
    :(sessions[0]||currentSession);
  const list=externalCandidates.filter(c=>c.exam_session===selSession)
    .sort((a,b)=>a.name.localeCompare(b.name));

  if(!canDo('admin')){
    document.getElementById("content").innerHTML=signInNotice('enter scores');return;
  }

  document.getElementById("content").innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <select onchange="renderEntranceScoresForSession(this.value)" style="width:auto">
        ${sessions.map(s=>`<option ${s===selSession?'selected':''}>${s}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--tx3)">${list.length} candidates</span>
    </div>
    ${list.length===0
      ?`<div class="card"><div class="empty"><i class="ti ti-clipboard-x"></i>No candidates for this session</div></div>`
      :`<div class="card"><div style="overflow-x:auto"><table id="score-tbl">
        <thead>
          <tr>
            <th>Candidate</th>
            ${ENTRANCE_SUBJECTS.map(s=>`<th style="min-width:90px">${s}</th>`).join('')}
            <th>Total</th>
            <th>Grade</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${list.map(c=>{
          const sc=candidateScoresMap[c.id]||{};
          const tot=hasScores(c.id)?candidateTotalScore(c.id):null;
          const grade=tot!=null?entranceGrade(tot,candidateMaxScore()):null;
          return`<tr id="scrow-${c.id}">
            <td style="font-weight:500;white-space:nowrap">${c.name}</td>
            ${ENTRANCE_SUBJECTS.map(sub=>`
              <td><input type="number" min="0" max="100" step="0.5"
                value="${sc[sub]?.score??''}"
                style="width:76px;padding:5px 8px;border:.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:12px"
                placeholder="—"
                onchange="updateScoreRowTotal(${c.id})"
                data-cid="${c.id}" data-sub="${sub.replace(/"/g,'&quot;')}" /></td>`).join('')}
            <td id="tot-${c.id}" style="font-weight:600">${tot!=null?tot+'/'+candidateMaxScore():'—'}</td>
            <td id="grd-${c.id}">${grade?`<span style="font-weight:700;font-size:12px;color:${gradeColor(grade)}">${grade}</span>`:'—'}</td>
            <td><button class="btn btn-sm btn-primary" style="font-size:11px;padding:4px 10px" onclick="saveScoreRow(${c.id})"><i class="ti ti-device-floppy"></i> Save</button></td>
          </tr>`;}).join('')}
        </tbody>
      </table></div></div>`}`;
}
function renderEntranceScoresForSession(session){
  const c=externalCandidates.find(x=>x.exam_session===session);
  if(c) _candScoreTarget=c.id;
  renderEntranceScores();
}
function updateScoreRowTotal(cid){
  let tot=0; let allFilled=true;
  ENTRANCE_SUBJECTS.forEach(sub=>{
    const inp=document.querySelector(`[data-cid="${cid}"][data-sub="${sub}"]`);
    if(inp&&inp.value!=='') tot+=parseFloat(inp.value)||0;
    else allFilled=false;
  });
  const totEl=document.getElementById(`tot-${cid}`);
  const grdEl=document.getElementById(`grd-${cid}`);
  if(totEl) totEl.textContent=allFilled?tot+'/'+candidateMaxScore():'—';
  if(grdEl){
    if(allFilled){const g=entranceGrade(tot,candidateMaxScore());grdEl.innerHTML=`<span style="font-weight:700;font-size:12px;color:${gradeColor(g)}">${g}</span>`;}
    else grdEl.textContent='—';
  }
}
async function saveScoreRow(cid){
  if(!canDo('admin')){alert("Sign in first");return;}
  const rows=[];
  for(const sub of ENTRANCE_SUBJECTS){
    const inp=document.querySelector(`[data-cid="${cid}"][data-sub="${sub}"]`);
    if(!inp||inp.value==='') continue;
    rows.push({candidate_id:cid,subject:sub,score:parseFloat(inp.value),max_score:100});
  }
  if(!rows.length){alert("Enter at least one score");return;}
  const {error}=await dbClient.from("candidate_scores")
    .upsert(rows,{onConflict:"candidate_id,subject"});
  if(error){alert("Error: "+error.message);return;}
  await loadCandidateScores();
  // refresh just this row's total/grade display
  const sc=candidateScoresMap[cid]||{};
  const tot=hasScores(cid)?candidateTotalScore(cid):null;
  const grade=tot!=null?entranceGrade(tot,candidateMaxScore()):null;
  const totEl=document.getElementById(`tot-${cid}`);
  const grdEl=document.getElementById(`grd-${cid}`);
  if(totEl) totEl.textContent=tot!=null?tot+'/'+candidateMaxScore():'—';
  if(grdEl) grdEl.innerHTML=grade?`<span style="font-weight:700;font-size:12px;color:${gradeColor(grade)}">${grade}</span>`:'—';
}

let _emailTargetSchool=null;
let _emailTargetSession="";
function renderEmailResults(){
  document.getElementById("page-title").textContent="Email Results";
  document.getElementById("page-meta").textContent="Send results to feeder schools";
  document.getElementById("topbar-actions").innerHTML="";
  if(!canDo('principal')){
    document.getElementById("content").innerHTML=`<div class="card" style="max-width:420px">
      <div class="card-head"><span class="card-title"><i class="ti ti-lock"></i> Principal access required</span></div>
      <p style="font-size:13px;color:var(--tx2)">Only the principal can send results emails.</p>
    </div>`;return;
  }
  const sessions=[...new Set(externalCandidates.map(c=>c.exam_session))].sort().reverse();
  if(!_emailTargetSession&&sessions.length) _emailTargetSession=sessions[0];

  const schoolsWithCandidates=feederSchools.filter(s=>
    externalCandidates.some(c=>c.feeder_school_id===s.id&&(!_emailTargetSession||c.exam_session===_emailTargetSession)));

  const selSchool=_emailTargetSchool?feederSchools.find(s=>s.id===_emailTargetSchool):schoolsWithCandidates[0];
  const candidates=selSchool
    ? externalCandidates.filter(c=>c.feeder_school_id===selSchool.id&&(!_emailTargetSession||c.exam_session===_emailTargetSession))
    : [];

  const maxS=candidateMaxScore();
  document.getElementById("content").innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <div class="card-head"><span class="card-title">Select school & session</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end">
        <div class="field" style="margin:0"><label>Session</label>
          <select id="er-session" onchange="_emailTargetSession=this.value;_emailTargetSchool=null;renderEmailResults()">
            ${sessions.map(s=>`<option ${s===_emailTargetSession?'selected':''}>${s}</option>`).join('')}
          </select></div>
        <div class="field" style="margin:0"><label>Feeder school</label>
          <select id="er-school" onchange="_emailTargetSchool=parseInt(this.value)||null;renderEmailResults()">
            ${schoolsWithCandidates.map(s=>`<option value="${s.id}" ${selSchool?.id===s.id?'selected':''}>${s.name}</option>`).join('')}
          </select></div>
      </div>
    </div>
    ${selSchool?`
    <div class="card" style="margin-bottom:14px">
      <div class="card-head">
        <div>
          <span class="card-title">${selSchool.name}</span>
          <div style="font-size:11px;color:var(--tx3);margin-top:3px">
            ${selSchool.email
              ?`Sending to: <strong>${selSchool.email}</strong>`
              :`<span style="color:var(--tx-err)"><i class="ti ti-alert-triangle"></i> No email set — add it in Feeder Schools</span>`}
          </div>
        </div>
        ${selSchool.email?`<button class="btn btn-primary" onclick="sendResultsEmail()"><i class="ti ti-send"></i> Send Results Email</button>`:''}
      </div>
      <div id="email-send-status" style="font-size:12px;margin-bottom:8px"></div>
      ${candidates.length===0
        ?`<div class="empty"><i class="ti ti-users-off"></i>No candidates from this school for this session</div>`
        :`<div style="overflow-x:auto"><table>
          <thead><tr><th>Name</th>${ENTRANCE_SUBJECTS.map(s=>`<th style="font-size:11px">${s}</th>`).join('')}<th>Total</th><th>Grade</th></tr></thead>
          <tbody>${candidates.map(c=>{
            const sc=candidateScoresMap[c.id]||{};
            const scored=hasScores(c.id);
            const tot=scored?candidateTotalScore(c.id):null;
            const grade=tot!=null?entranceGrade(tot,maxS):null;
            return`<tr>
              <td style="font-weight:500">${c.name}</td>
              ${ENTRANCE_SUBJECTS.map(sub=>`<td style="text-align:center">${sc[sub]?.score??'—'}</td>`).join('')}
              <td style="font-weight:600;text-align:center">${tot!=null?tot+'/'+maxS:'—'}</td>
              <td style="text-align:center">${grade?`<span style="font-weight:700;font-size:12px;color:${gradeColor(grade)}">${grade}</span>`:'—'}</td>
            </tr>`;}).join('')}
          </tbody></table></div>`}
    </div>`:`<div class="card"><div class="empty">No schools have candidates for this session</div></div>`}`;
}
async function sendResultsEmail(){
  if(!canDo('principal')){alert("Principal access required");return;}
  const selSchool=_emailTargetSchool?feederSchools.find(s=>s.id===_emailTargetSchool):null;
  if(!selSchool?.email){alert("No email address for this school");return;}
  const candidates=externalCandidates.filter(c=>c.feeder_school_id===selSchool.id&&(!_emailTargetSession||c.exam_session===_emailTargetSession));
  if(!candidates.length){alert("No candidates to send");return;}
  const st=document.getElementById("email-send-status");
  if(st) st.innerHTML=`<span style="color:var(--tx-warn)"><i class="ti ti-loader"></i> Sending…</span>`;
  const payload={
    school_name:selSchool.name,
    school_email:selSchool.email,
    contact_person:selSchool.contact_person||null,
    exam_session:_emailTargetSession,
    candidates:candidates.map(c=>{
      const sc=candidateScoresMap[c.id]||{};
      const scores={};
      ENTRANCE_SUBJECTS.forEach(sub=>{ scores[sub]=sc[sub]?.score??null; });
      return{name:c.name,scores};
    }),
  };
  try{
    const res=await fetch('/api/send-results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Send failed');
    if(st) st.innerHTML=`<span style="color:var(--tx-ok)"><i class="ti ti-check"></i> Email sent successfully to ${selSchool.email}</span>`;
  }catch(e){
    if(st) st.innerHTML=`<span style="color:var(--tx-err)"><i class="ti ti-alert-triangle"></i> ${e.message}</span>`;
  }
}

/* ── role management ── */
function canDo(level){
  if(level==='admin')    return _role==='admin'||_role==='principal';
  if(level==='principal')return _role==='principal';
  return true;
}
function signInNotice(action='perform this action'){
  return`<div class="signin-notice"><i class="ti ti-lock" style="font-size:16px;color:var(--tx3);flex-shrink:0"></i>
    <span>Sign in to ${action}. <a href="#" onclick="openLoginModal();return false">Sign in now</a></span></div>`;
}

        <i class="ti ti-user" style="font-size:24px;color:var(--navy)"></i>
        <div style="font-size:13px;font-weight:600;margin-top:8px;color:var(--tx)">Office Admin</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:3px">Payments, expenses & stock</div>
      </div>
      <div id="rc-principal" onclick="selectLoginRole('principal')" style="border:.5px solid var(--bd3);border-radius:var(--r);padding:14px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s">
        <i class="ti ti-shield-lock" style="font-size:24px;color:var(--burg)"></i>
        <div style="font-size:13px;font-weight:600;margin-top:8px;color:var(--tx)">Principal</div>
        <div style="font-size:11px;color:var(--tx3);margin-top:3px">Full system access</div>
      </div>
    </div>
    <div id="login-pin-wrap" style="display:none">
      <div class="field"><label id="login-pin-lbl">PIN</label>
        <input type="password" id="login-pin" placeholder="Enter PIN…" onkeydown="if(event.key==='Enter')submitRoleLogin()" /></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="submitRoleLogin()"><i class="ti ti-login"></i> Sign In</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
      </div>
      <div id="login-err" style="margin-top:8px;font-size:12px;color:var(--tx-err)"></div>
    </div>`);
}
function selectLoginRole(role){
  _loginRole=role;
  ['admin','principal'].forEach(r=>{
    const el=document.getElementById('rc-'+r);
    if(el){el.style.borderColor=r===role?(role==='principal'?'var(--burg)':'var(--navy)'):'var(--bd3)';
           el.style.background=r===role?'var(--bg2)':'var(--bg)';}
  });
  document.getElementById('login-pin-wrap').style.display='block';
  document.getElementById('login-pin-lbl').textContent=role==='admin'?'Admin PIN':'Principal PIN';
  setTimeout(()=>document.getElementById('login-pin')?.focus(),50);
}
async function submitRoleLogin(){
  if(!_loginRole){alert("Select a role");return;}
  const pin=document.getElementById("login-pin")?.value?.trim();
  const errEl=document.getElementById("login-err");
  if(!pin){if(errEl)errEl.textContent="Enter your PIN";return;}
  const hash=await sha256(pin);
  if(_loginRole==='admin'){
    if(!storedAdminPinHash){if(errEl)errEl.textContent="No admin PIN set yet. Ask the principal to set one in Settings.";return;}
    if(hash!==storedAdminPinHash){if(errEl)errEl.textContent="Incorrect PIN";return;}
    _role='admin';
  }else{
    if(!storedPinHash){if(errEl)errEl.textContent="No principal PIN set. Create one via Principal's Desk.";return;}
    if(hash!==storedPinHash){if(errEl)errEl.textContent="Incorrect PIN";return;}
    _role='principal'; adminUnlocked=true;
  }
  closeModal(); renderHub();
}
function signOut(){ _role=null; adminUnlocked=false; renderHub(); }

/* ── inventory / stock helpers ── */
function stockCurrentQty(itemId){
  return inventoryTxns.filter(t=>t.item_id===itemId).reduce((s,t)=>s+(parseInt(t.quantity)||0),0);
}
function stockTermRevenue(){
  return inventoryTxns
    .filter(t=>t.transaction_type==='sale'&&t.term===currentTerm&&t.session===currentSession)
    .reduce((s,t)=>s+parseFloat(t.total_value||0),0);
}
function stockQtyBadge(qty,threshold){
  if(qty<=0) return`<span class="stock-qty-out">Out of stock</span>`;
  if(qty<=threshold) return`<span class="stock-qty-low">${qty} left (low)</span>`;
  return`<span class="stock-qty-ok">${qty} in stock</span>`;
}

function renderInventory(){
